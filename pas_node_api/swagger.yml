  /api/v1/admin_user_activity/purge-old-activities:
    get:
      tags:
        - Admin User Activity
      summary: Delete user activity records older than 90 days
      description: |
        Permanently deletes all documents in the user_activities Elasticsearch index
        where dateTime is older than 90 days from the current time.
        Add ?dry_run=true to preview the count without deleting.
        Requires a valid JWT token (Bearer or authToken cookie).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: dry_run
          schema:
            type: boolean
            default: false
          description: If true, counts matching documents without deleting them.
      responses:
        '200':
          description: Purge completed (or dry-run count returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  dry_run:
                    type: boolean
                    description: Present and true only when dry_run=true was passed
                    example: true
                  message:
                    type: string
                    example: "Deleted 15432 document(s) older than 90 days."
                  data:
                    type: object
                    properties:
                      cutoff_timestamp:
                        type: integer
                        description: Unix timestamp used as the cutoff (now minus 90 days)
                        example: 1773235200
                      cutoff_date:
                        type: string
                        format: date-time
                        example: "2026-03-11T00:00:00.000Z"
                      deleted:
                        type: integer
                        description: Number of documents deleted (0 for dry_run)
                        example: 15432
                      failures:
                        type: integer
                        description: Number of shard-level failures
                        example: 0
                      docs_to_delete:
                        type: integer
                        description: Present only when dry_run=true
                        example: 15432
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 500
                  message:
                    type: string
                    example: Internal server error
                  error:
                    type: string
                    example: "connect ECONNREFUSED 127.0.0.1:9200"
