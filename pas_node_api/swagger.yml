openapi: 3.0.3

info:
  title: PAS Node Transfer API
  description: |
    Ad intelligence API gateway — Facebook & Instagram ad search, details, analytics.

    ## Authentication
    All protected endpoints require a valid JWT token.
    Pass it as a **Bearer token** in the `Authorization` header **or** it is automatically
    sent as the `authToken` httpOnly cookie after login.

    ## Dev Test User
    ```
    Email:    test@pas.dev
    Password: Test@123
    ```
    *(Only works when server is in development mode)*
  version: 1.0.0
  contact:
    name: PAS Dev Team

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://stagingtest-api.poweradspy.com
    description: Port forwarded development server
  - url: https://v2-api.poweradspy.com
    description: Port forwarded Prod server

# ─── Security scheme ────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from /api/v1/auth/login — paste the `token` field from the response
    SignatureAuth:
      type: apiKey
      in: header
      name: x-signature
      description: |
        HMAC-SHA256 of the raw request body, hex-encoded, using the shared
        insertion secret (config.insertion.secretKey / env INSERTION_SECRET_KEY).
        Used only by the insertion endpoints. Alternatively, requests whose body
        `platform` equals the configured bypass value (default `"12"`) are allowed
        without a signature.
    DeleteTokenAuth:
      type: apiKey
      in: header
      name: x-delete-token
      description: |
        Shared secret token for the secure delete endpoint
        (config.insertion.deleteToken / env API_DELETE_TOKEN). May also be sent as
        body.token. Compared in constant time.

  # ─── Reusable schemas ─────────────────────────────────────
  schemas:

    # Insertion
    MetaAdInsert:
      type: object
      required: [ad_id, type, category, image_video_url, ad_position, likes, comment, share, platform, version, first_seen, last_seen, country]
      properties:
        ad_id: { type: string, example: "FB_123" }
        type: { type: string, enum: [IMAGE, VIDEO], example: IMAGE }
        category: { type: string, example: Retail }
        call_to_action: { type: string, nullable: true, example: Shop Now }
        image_video_url: { type: string, format: uri, example: https://cdn.example.com/ad.jpg }
        thumbnail_url: { type: string, nullable: true, description: Required when type=VIDEO }
        ad_position: { type: string, example: FEED }
        likes: { type: integer, example: 120 }
        comment: { type: integer, example: 8 }
        share: { type: integer, example: 4 }
        views: { type: integer, nullable: true, description: Required-ish for VIDEO (LCS must not exceed views) }
        other_multimedia: { type: string, nullable: true, description: "Pipe-delimited extra media URLs (||, or || or |)" }
        destination_url: { type: string, nullable: true }
        ad_title: { type: string, nullable: true }
        news_feed_description: { type: string, nullable: true }
        ad_text: { type: string, nullable: true }
        ad_url: { type: string, nullable: true }
        post_owner: { type: string, nullable: true }
        post_owner_image: { type: string, nullable: true }
        platform: { type: integer, example: 5, description: "2=Socinator, 3=FB-not-user, 5/6=Android/iOS, 10=system, 11, 12=bypass" }
        version: { type: string, example: "1.3.2" }
        post_date: { type: string, nullable: true, description: epoch seconds (or ms) }
        first_seen: { type: string, example: "1700000000" }
        last_seen: { type: string, example: "1700600000" }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        country: { type: array, items: { type: string }, example: ["US", "GB"] }
        facebook_id: { type: string, nullable: true, description: Discovering user (required unless platform=3) }
        meta_ad_id: { type: string, nullable: true }
        comments_data: { type: array, items: { type: object }, nullable: true }
        socionator: { type: integer, nullable: true, description: "1 = skip validation" }

    AdsLibraryInsert:
      type: object
      required: [ad_id, type, ad_position, platform, verified, EUT, ad_run_platforms, impressions_high, country]
      properties:
        ad_id: { type: string, example: "LIB_456" }
        type: { type: string, enum: [IMAGE, VIDEO], example: IMAGE }
        ad_position: { type: string, example: FEED }
        image_video_url: { type: string, nullable: true }
        ad_image: { type: string, nullable: true }
        thumbnail_url: { type: string, nullable: true, description: Required when type=VIDEO }
        other_multimedia: { type: string, nullable: true }
        destination_url: { type: string, nullable: true }
        ad_title: { type: string, nullable: true }
        news_feed_description: { type: string, nullable: true }
        ad_text: { type: string, nullable: true }
        meta_ad_url: { type: string, nullable: true }
        post_owner: { type: string, nullable: true }
        post_owner_image: { type: string, nullable: true }
        platform: { type: integer, example: 15 }
        verified: { type: integer, example: 1 }
        call_to_action: { type: string, nullable: true }
        first_seen: { type: string, example: "1700000000" }
        last_seen: { type: string, example: "1700600000" }
        est_audience_size_low: { type: integer, nullable: true }
        est_audience_size_high: { type: integer, nullable: true }
        EUT: { type: integer, example: 12000 }
        ad_run_platforms: { type: array, items: { type: string }, example: ["facebook", "instagram"] }
        currency: { type: string, nullable: true, example: USD }
        impressions_low: { type: integer, nullable: true, example: 1000 }
        impressions_high: { type: integer, example: 5000 }
        country: { type: array, items: { type: string }, description: ISO codes, example: ["US", "GB"] }
        meta_ad_id: { type: string, nullable: true }
        lowerBudget: { type: number, nullable: true }
        upperBudget: { type: number, nullable: true }
        collation_id: { type: string, nullable: true }
        location: { type: string, nullable: true }
        gender: { type: object, nullable: true }
        age: { type: object, nullable: true }
        page_details:
          type: object
          nullable: true
          properties:
            page_category: { type: string, example: Retail }
            page_name: { type: string, example: Example Brand }

    NativeAdInsert:
      type: object
      required: [network, type, post_owner, platform, destination_url, ad_id, ad_position, version, source, target_site, placement_url, system_id, country]
      properties:
        network:              { type: string, example: Taboola, description: "Ad network name — ucfirst normalized (e.g. 'taboola' → 'Taboola')" }
        type:                 { type: string, enum: [IMAGE, TEXT], example: IMAGE }
        post_owner:           { type: string, example: "Test Advertiser", description: "Cannot be N/A, NA, or None" }
        post_owner_image:     { type: string, nullable: true, example: "https://example.com/owner.jpg" }
        ad_title:             { type: string, nullable: true, example: "Best Deal Today" }
        ad_text:              { type: string, nullable: true, example: "Click here to learn more" }
        newsfeed_description: { type: string, nullable: true, example: "Amazing product" }
        platform:             { type: integer, example: 12, description: "12 bypasses x-signature auth" }
        destination_url:      { type: string, example: "https://example.com/landing" }
        ad_id:                { type: string, example: "nat_unique_001" }
        city:                 { type: string, nullable: true, example: "Mumbai" }
        state:                { type: string, nullable: true, example: "Maharashtra" }
        country:              { type: string, example: "India", description: "Cannot be empty, N/A, or NA" }
        ad_position:          { type: string, example: "FEED" }
        ad_number_position:   { type: integer, nullable: true, example: 1 }
        version:              { type: string, example: "1.0.0", description: "Platforms 4, 10, 3 exempt; others need >= 1.0.0" }
        ip_address:           { type: string, nullable: true, example: "127.0.0.1" }
        source:               { type: string, enum: [desktop, android, ios], example: desktop }
        target_site:          { type: string, example: "example.com" }
        image_url_original:   { type: string, nullable: true, example: "https://cdn.example.com/ad.jpg" }
        ad_image:             { type: string, nullable: true, example: "https://cdn.example.com/ad.jpg", description: "Required for IMAGE type" }
        placement_url:        { type: string, example: "https://news.example.com/article" }
        system_id:            { type: string, example: "sys_001" }
        first_seen:           { type: integer, nullable: true, example: 1716000000, description: Epoch seconds }
        last_seen:            { type: integer, nullable: true, example: 1716000000, description: Epoch seconds }
        post_date:            { type: integer, nullable: true, example: 1716000000, description: Epoch seconds }
        redirect_url:         { type: string, nullable: true }

    NativeAdDelete:
      type: object
      properties:
        id:    { type: integer, example: 123, description: "Internal native_ad.id — use this OR ad_id" }
        ad_id: { type: string, example: "nat_unique_001", description: "Platform ad_id — use this OR id" }

    InsertionResponse:
      type: object
      description: Single-ad result, or a batch summary when an array was sent.
      properties:
        code: { type: integer, example: 200 }
        message: { type: string, example: Ad inserted successfully }
        data:
          oneOf:
            - type: object
              properties:
                id: { type: integer, example: 98765 }
            - type: array
              description: Per-ad results (batch mode)
              items: { type: object }
        meta:
          type: object
          description: Present in batch mode
          properties:
            total: { type: integer, example: 3 }
            ok: { type: integer, example: 2 }
            failed: { type: integer, example: 1 }

    # Auth
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: test@pas.dev
        password:
          type: string
          example: Test@123

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Login successful
        data:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            expiresIn:
              type: string
              example: 24h
            user:
              $ref: '#/components/schemas/UserPayload'

    UserPayload:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          example: test@pas.dev
        name:
          type: string
          example: Test User
        plan_id:
          type: integer
          example: 99
        role:
          type: string
          example: admin

    # Search
    DateRange:
      type: object
      properties:
        lower_date:
          type: string
          format: date
          example: "2024-01-01"
        upper_date:
          type: string
          format: date
          example: "2024-12-31"

    NumberRange:
      type: array
      items:
        type: integer
      minItems: 2
      maxItems: 2
      example: [100, 5000]

    AgeRange:
      type: object
      properties:
        lower_age:
          type: integer
          example: 18
        upper_age:
          type: integer
          example: 45

    FacebookSearchRequest:
      type: object
      properties:
        # Pagination
        take:
          type: integer
          description: Results per page
          default: 20
          example: 20
        skip:
          type: integer
          description: Page number (0-indexed)
          default: 0
          example: 0
        # Keyword filters
        keyword:
          type: string
          example: shoes
        postOwnerName:
          type: string
          example: Nike
        url:
          type: string
          example: nike.com
        # Geo
        country:
          type: array
          items:
            type: string
          example: ["US", "UK"]
        state:
          type: array
          items:
            type: string
          example: ["California"]
        city:
          type: array
          items:
            type: string
          example: ["Los Angeles"]
        notCountry:
          type: string
          example: IN
        # Ad attributes
        type:
          type: array
          description: Ad type (IMAGE, VIDEO, CAROUSEL, etc.)
          items:
            type: string
          example: ["VIDEO"]
        adPosition:
          type: array
          description: "Placement (FEED, STORY, REEL, etc.)"
          items:
            type: string
          example: ["FEED"]
        callToAction:
          type: array
          items:
            type: string
          example: ["SHOP_NOW", "LEARN_MORE"]
        adCategory:
          type: array
          items:
            type: string
          example: ["eCommerce"]
        subCategory:
          type: array
          items:
            type: string
          example: ["Fashion"]
        gender:
          type: array
          items:
            type: string
          example: ["female"]
        status:
          type: array
          items:
            type: string
          example: ["active"]
        source:
          type: array
          items:
            type: string
          example: ["desktop"]
        langDetect:
          type: array
          items:
            type: string
          example: ["en"]
        verified:
          type: string
          example: "1"
        # Tech / tracking
        builtWith:
          type: array
          items:
            type: string
          example: ["Shopify"]
        track:
          type: array
          items:
            type: string
          example: ["Facebook Pixel"]
        funnel:
          type: array
          items:
            type: string
          example: ["retargeting"]
        affiliate:
          type: array
          items:
            type: string
          example: ["ClickBank"]
        marketPlatform:
          type: array
          items:
            type: string
          example: ["Amazon"]
        tags:
          type: array
          items:
            type: string
          example: ["dropshipping"]
        # Image analysis
        ocr:
          type: string
          description: Text detected inside ad image (OCR)
          example: "50% off"
        celebrity:
          type: array
          items:
            type: string
          example: ["Elon Musk"]
        imageObject:
          type: array
          items:
            type: string
          example: ["dog"]
        needle:
          type: string
          example: "supplement"
        metaFilter:
          type: boolean
          description: Filter to ads with meta targeting data
          example: true
        # Metric ranges [min, max]
        likes:
          $ref: '#/components/schemas/NumberRange'
        comments:
          $ref: '#/components/schemas/NumberRange'
        shares:
          $ref: '#/components/schemas/NumberRange'
        impressions:
          $ref: '#/components/schemas/NumberRange'
        popularity:
          $ref: '#/components/schemas/NumberRange'
        adBudget:
          $ref: '#/components/schemas/NumberRange'
        # Date ranges
        lastSeen:
          $ref: '#/components/schemas/DateRange'
        postDate:
          $ref: '#/components/schemas/DateRange'
        pageCreation:
          $ref: '#/components/schemas/DateRange'
        domainDate:
          $ref: '#/components/schemas/DateRange'
        lowerAgeSeen:
          $ref: '#/components/schemas/AgeRange'
        # Sort (send the field you want to sort by with value asc/desc)
        newest_sort:
          type: string
          enum: [asc, desc]
          description: Sort by last seen date
        running_longest_sort:
          type: string
          enum: [asc, desc]
          description: Sort by days running
        likes_sort:
          type: string
          enum: [asc, desc]
        comments_sort:
          type: string
          enum: [asc, desc]
        shares_sort:
          type: string
          enum: [asc, desc]
        seen_btn_sort:
          type: string
          enum: [asc, desc]
          description: Sort by hits/seen count
        post_date_btn_sort:
          type: string
          enum: [asc, desc]
        domain_sort:
          type: string
          enum: [asc, desc]
          description: Sort by domain registration date

    YouTubeSearchRequest:
      type: object
      description: |
        Filter body for YouTube ad search.
        Key differences from Facebook/Instagram:
        - `views` and `dislikes` replace `shares`, `impressions`, and `popularity`
        - `views_sort` and `dislikes_sort` are YouTube-only sort fields
        - No `shares_sort`, `impression_sort`, `popularity_sort`, `adBudget`, `metaFilter`, `track`, or `marketPlatform`
      properties:
        # Pagination
        take:
          type: integer
          default: 20
          example: 20
        skip:
          type: integer
          description: Page number (0-indexed)
          default: 0
          example: 0
        # Keyword filters
        keyword:
          type: string
          example: fitness
        advertiser:
          type: string
          description: Channel / post owner name
          example: Nike Official
        domain:
          type: string
          example: nike.com
        # Geo
        country:
          type: array
          items:
            type: string
          example: ["US", "UK"]
        notCountry:
          type: string
          example: IN
        # Ad attributes
        type:
          type: array
          description: Ad type (VIDEO, IMAGE, etc.)
          items:
            type: string
          example: ["VIDEO"]
        ad_position:
          type: array
          items:
            type: string
          example: ["INSTREAM"]
        call_to_action:
          type: array
          items:
            type: string
          example: ["VISIT_SITE"]
        lang:
          type: array
          items:
            type: string
          example: ["en"]
        verified:
          type: string
          example: "1"
        # Tech / tracking
        ecommerce:
          type: array
          description: Built-with / ecommerce platform filter
          items:
            type: string
          example: ["Shopify"]
        funnel:
          type: array
          items:
            type: string
          example: ["retargeting"]
        affiliate:
          type: array
          items:
            type: string
          example: ["ClickBank"]
        source:
          type: array
          items:
            type: string
          example: ["desktop"]
        # Image analysis
        ocr:
          type: string
          example: "50% off"
        image_celebrity:
          type: array
          items:
            type: string
          example: ["Elon Musk"]
        image_object:
          type: array
          items:
            type: string
          example: ["car"]
        image_logo:
          type: array
          items:
            type: string
          example: ["Nike"]
        # YouTube-specific metric ranges [min, max]
        likes:
          $ref: '#/components/schemas/NumberRange'
        dislikes:
          $ref: '#/components/schemas/NumberRange'
        comments:
          $ref: '#/components/schemas/NumberRange'
        views:
          $ref: '#/components/schemas/NumberRange'
        # Date ranges
        seen_btn_sort:
          $ref: '#/components/schemas/DateRange'
        post_date_btn_sort:
          $ref: '#/components/schemas/DateRange'
        domain_date_btn_sort:
          $ref: '#/components/schemas/DateRange'
        lower_age:
          type: integer
          example: 18
        upper_age:
          type: integer
          example: 45
        # Sort (send the field you want to sort by with value asc/desc)
        newest_sort:
          type: string
          enum: [asc, desc]
        running_longest_sort:
          type: string
          enum: [asc, desc]
        likes_sort:
          type: string
          enum: [asc, desc]
        dislikes_sort:
          type: string
          enum: [asc, desc]
        views_sort:
          type: string
          enum: [asc, desc]
        comments_sort:
          type: string
          enum: [asc, desc]
        domain_sort:
          type: string
          enum: [asc, desc]
        # Special modes
        favorite:
          type: string
          enum: ["true"]
          description: Return this user's favorited YouTube ads
        hidden:
          type: string
          enum: ["true"]
          description: Return this user's hidden YouTube ads
        needle:
          type: string
          description: Cursor timestamp to exclude newly ingested ads
        user_id:
          type: integer
          example: 281

    SearchResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Success
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          properties:
            total:
              type: object
              description: Ad count per network (always returned for all networks, even when only one is requested)
              properties:
                facebook:
                  type: integer
                  example: 15423
                instagram:
                  type: integer
                  example: 8712
                youtube:
                  type: integer
                  example: 4301
            networksWithData:
              type: array
              items:
                type: string
              example: ["facebook", "instagram", "youtube"]
            suggestedNetworks:
              type: array
              description: Non-empty when the requested network returned 0 results but others have data
              items:
                type: string
              example: []
            ipcountry:
              type: string
              example: US
            ipCountryActive:
              type: boolean
              example: true

    RecentAdsResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: Recent ads fetched successfully
        data:
          type: array
          description: |
            Merged ads from every queried network, sorted by `last_seen` descending
            (newest first). Each item is a **full, frontend-ready ad** — the same
            hydrated/cleaned shape `/api/v1/common/ads/search` returns (images, text,
            title, advertiser, URLs) — plus a `network` field identifying its platform.
            Exact fields vary per network; common ones are shown below.
          items:
            type: object
            properties:
              network:
                type: string
                description: Platform the ad belongs to
                example: facebook
              id:
                type: integer
                example: 12345
              ad_id:
                type: integer
                example: 12345
              ad_title:
                type: string
                example: "Summer Sale — 50% Off"
              ad_text:
                type: string
              image_video_url:
                type: string
                description: CDN-resolved image/thumbnail URL
              post_owner:
                type: string
                description: Advertiser / page name
              last_seen:
                type: string
                format: date-time
            additionalProperties: true
        meta:
          type: object
          properties:
            days:
              type: integer
              description: Applied look-back window in days
              example: 1
            limit:
              type: integer
              description: Max ads returned per network
              example: 20
            from:
              type: string
              description: Start of the window (yyyy-MM-dd HH:mm:ss)
              example: "2026-06-14 09:00:00"
            to:
              type: string
              description: End of the window — now (yyyy-MM-dd HH:mm:ss)
              example: "2026-06-15 09:00:00"
            total:
              type: object
              description: Per-network Elasticsearch match count for the window (all queried networks)
              additionalProperties:
                type: integer
              example: { facebook: 1243, instagram: 880, google: 0 }
            returned:
              type: object
              description: Per-network number of ads actually included in `data` (capped by `limit`)
              additionalProperties:
                type: integer
              example: { facebook: 20, instagram: 20, google: 0 }
            networks:
              type: array
              description: Networks that were queried
              items:
                type: string
              example: ["facebook", "instagram", "google"]
            ignoredNetworks:
              type: array
              description: Present only when unknown network names were passed and skipped
              items:
                type: string
              example: ["myspace"]
            errors:
              type: object
              description: Present only when one or more networks failed or timed out
              additionalProperties:
                type: string
              example: { quora: "Timeout" }

    AdDetailRequest:
      type: object
      required: [ad_id]
      properties:
        ad_id:
          type: integer
          example: 12345
        language:
          type: string
          description: Language code for translation overlay
          example: en

    AdDetailResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: array
          description: Array with single ad object containing all details
          items:
            type: object
            properties:
              id:
                type: integer
              platform:
                type: string
              type:
                type: string
              ad_position:
                type: string
              likes:
                type: integer
              views:
                type: integer
              impression:
                type: integer
              popularity:
                type: integer
              comment:
                type: integer
              share:
                type: integer
              post_date:
                type: string
                format: date-time
              first_seen:
                type: string
                format: date-time
              last_seen:
                type: string
                format: date-time
              days_running:
                type: integer
              domain:
                type: string
              ad_url:
                type: string
              destination_url:
                type: string
              built_with:
                type: string
              call_to_action:
                type: string
              ad_title:
                type: string
              ad_text:
                type: string
              post_owner:
                type: string
              post_owner_id:
                type: integer
              ad_status:
                type: string
                enum: [Active, Inactive]
              country_iso:
                type: array
                items:
                  type: object
        meta:
          type: object
          properties:
            country:
              type: array
              items:
                type: string
            builtwithStatusCode:
              type: integer

    HideAdRequest:
      type: object
      required: [type]
      properties:
        post_owner_id:
          type: integer
          description: Required for type=1 (hide advertiser)
          example: 5678
        ad_id:
          type: integer
          description: Required for type=2 (hide ad) and type=3 (favorite)
          example: 12345
        type:
          type: integer
          description: "1=hide advertiser, 2=hide ad, 3=favorite"
          enum: [1, 2, 3]
          example: 3

    GetHiddenRequest:
      type: object
      properties:
        user_id:
          type: integer
          description: Auto-injected from JWT token — no need to send manually
          example: 1

    GetHiddenResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: array
          description: Hidden advertiser IDs (type=1)
          items:
            type: integer
        addata:
          type: array
          description: Hidden ad IDs (type=2)
          items:
            type: integer
        favorite:
          type: array
          description: Favorited ad IDs (type=3)
          items:
            type: integer

    CountResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
        data:
          type: object
          properties:
            count:
              type: integer
              example: 8524311

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: "Unauthorized: No token provided"
        status:
          type: string
          enum: [rejected, server_error]
          description: "Insertion endpoints: 'rejected' = caller must fix the data/request; 'server_error' = our side, retry later."
          example: rejected
        hint:
          type: string
          description: "Insertion endpoints: what to do next to get the ad inserted."
          example: "Add the platform ad_id to the payload and resend."
        errors:
          type: array
          items: { type: string }
          description: "Insertion validation: every field that needs fixing."
          example: ["The ad_id field is required.", "The type must be IMAGE or VIDEO."]
        field:
          type: string
          description: "Insertion endpoints: the single offending field, when applicable."
          example: thumbnail_url

# ─── Global security (override per endpoint if public) ──────
security:
  - BearerAuth: []

# ─── Tags ───────────────────────────────────────────────────
tags:
  - name: Auth
    description: Login, logout, session management
  - name: Facebook
    description: Facebook ad intelligence endpoints
  - name: Facebook Insertion
    description: Facebook ad insertion endpoints (metaAdsData, adsLibrary). Signature-authenticated (x-signature).
  - name: Native Insertion
    description: Native ad insertion and deletion — port of PHP NativeAdController. Supports IMAGE and TEXT types across all native networks (Taboola, Outbrain, etc.).
  - name: Pinterest Insertion
    description: Pinterest ad insertion and deletion — port of PHP adsController@insertAds. Supports Image and Video types. NAS upload happens BEFORE DB writes (PHP-exact pattern).
  - name: Instagram
    description: Instagram ad intelligence endpoints
  - name: YouTube
    description: YouTube ad intelligence endpoints
  - name: YouTube Insertion
    description: YouTube ad insertion endpoints (ytAdsData, delete). Handles IMAGE/VIDEO/TEXT/RESPONSIVE/DISPLAY/DISCOVERY/TEXT_IMAGE. Signature-authenticated (x-signature) or platform-12 bypass.
  - name: LinkedIn
    description: LinkedIn ad intelligence endpoints
  - name: LinkedIn Insertion
    description: LinkedIn ad insertion endpoints (lnAdsData, delete) — one endpoint for normal LinkedIn (platform 10) AND ads library (platform 15). Signature-authenticated (x-signature) or platform-12 bypass.
  - name: LinkedIn Landers
    description: LinkedIn destination-lander scraping pipeline (get-ads-for-blackhat, upload_file_to-server, insert_html_lander). Scraper-facing; unauthenticated (like the PHP). Writes lander tables + patches linkedin_ads_data ES.
  - name: YouTube Landers
    description: YouTube destination-lander scraping pipeline (get_youtubeid_for_lander, upload_blackhat_image_zip, insert_html_content_lander). Scraper-facing; unauthenticated. Patches youtube_ads_data ES.
  - name: Facebook Landers
    description: Facebook destination-lander scraping pipeline (getAdwithCountryCode, uploadFileToServer, insertHtmlRedirectCountry). Scraper-facing; unauthenticated. Patches search_mix ES.
  - name: Facebook OCR
    description: Facebook image OCB (object/celebrity/brand) and OCR (text) pipeline (getFBImageUrl, update-image-info). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report writes facebook_ad_variants + patches search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: GDN OCR
    description: GDN image OCB (object/celebrity/brand) and OCR (text) pipeline (getGDNImageUrl, insert-GDN-imageUrl-data). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report patches gdn_search_mix ES FIRST (normalized ||-joined strings) then writes gdn_ad_variants. Every response is HTTP 200 — outcome is in the body code.
  - name: YouTube OCB
    description: YouTube image OCB (object/celebrity/brand) pipeline (get-ocb-url, insert-update-ocb). Scraper-facing; unauthenticated. Lease (type=1, image) leases off ocb_url_status; report upserts youtube_ad_ocb, flips youtube_ad_variants.ocb_url_status, and patches the youtube_ads_data ES doc by _id (fields image_object/image_celebrity/image_brand as arrays, no language families). Body uses the PHP buildResponse shape (messages/data). Every response is HTTP 200 — outcome is in the body code.
  - name: Native OCR
    description: Native image OCB (object/celebrity/brand) and OCR (text) pipeline (getNativeImageUrl, update-image-info). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report writes native_ad_variants + patches native_search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: Quora OCR
    description: Quora image OCB (object/celebrity/brand) and OCR (text) pipeline (getQuoraImageUrl, update-image-info). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report writes quora_ad_variants + patches quora_search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: Reddit OCR
    description: Reddit image OCB (object/celebrity/brand) and OCR (text) pipeline (getImageUrl, updateImageDetails). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report writes reddit_ad_variants + patches reddit_search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: Pinterest OCR
    description: Pinterest image OCB (object/celebrity/brand) and OCR (text) pipeline (get-pinterest-image-url, update-image-info). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR); report writes pinterest_ad_variants + patches pinterest_search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: Instagram OCR
    description: Instagram image OCB (object/celebrity/brand) and OCR (text) pipeline (getImageUrl, updateImageDetails). Scraper-facing; unauthenticated. Lease returns IMAGE/STORIES ads seen in the last 10 days and drives off image_url_status (0=OCB, 4=OCR); report writes instagram_ad_variants + patches instagram_search_mix ES. Every response is HTTP 200 — outcome is in the body code.
  - name: LinkedIn OCR
    description: LinkedIn image OCB (object/celebrity/brand) and OCR (text) pipeline (get-linkedin-image-url, update-image-info). Scraper-facing; unauthenticated. Lease drives off image_url_status (0=OCB, 4=OCR; no last_seen window). OCB/OCR columns live in a SEPARATE table linkedin_ad_ocr_ocb_details. Report is MySQL-FIRST (linkedin_ad_variants status + linkedin_ad_ocr_ocb_details raw values) then patches the flat linkedin_ads_data ES doc BY id=ad_id — object/celebrity/brand as ||-exploded arrays (brand key image_brand), ocr as a string, only for status 1/4. Every response is HTTP 200 — outcome is in the body code.
  - name: Google Landers
    description: Google (gtext) destination-lander scraping pipeline (get_ads_for_blackhat, upload_gtext_blackhat, insert_html_content). Scraper-facing; unauthenticated. Patches google_ads_data ES.
  - name: GDN Landers
    description: GDN (Google Display Network) destination-lander scraping pipeline (get_ads_for_blackhat, upload_gdn_blackhat, insert_html_content). Scraper-facing; unauthenticated. Patches gdn_search_mix ES (dotted gdn_ad.id).
  - name: Reddit
    description: Reddit ad intelligence endpoints
  - name: GDN
    description: Google Display Network ad intelligence endpoints
  - name: GDN Insertion
    description: GDN ad insertion endpoints (GDN ad data, delete). Signature-authenticated (x-signature) or platform-12 bypass.
  - name: Google
    description: Google Text ad intelligence endpoints
  - name: GTEXT Insertion
    description: Google Text (gtext) ad insertion endpoints (gtAdsData, delete). Signature-authenticated (x-signature) or platform bypass.
  - name: Quora
    description: Quora ad intelligence endpoints
  - name: Pinterest
    description: Pinterest ad intelligence endpoints
  - name: Common
    description: Cross-network search (searches Facebook, Instagram & YouTube simultaneously)
  - name: Keyword Search
    description: |
      NEW MongoDB keyword/advertiser/domain search-tracking store. One deduplicated
      document per (type, value); accumulates the users who searched it and tracks
      scraping status PER NETWORK (facebook scraped ≠ instagram scraped). Fully
      controlled by config.keywordSearch. See docs/KEYWORD_SEARCH_REVAMP_MANIFEST.md.
  - name: SDUI
    description: Server-Driven UI config, filters, and version endpoints
  - name: Health
    description: Server health check
  - name: Admin User Activity
    description: Admin-level user counts from aMember and Elasticsearch activity index
  - name: Email
    description: Email unsubscribe / resubscribe (aMember unsubscribed flag + SendGrid global suppression)

# ─── Paths ──────────────────────────────────────────────────
paths:

  # ═══════════════════════════════════════════
  # EMAIL — unsubscribe / resubscribe
  # ═══════════════════════════════════════════
  /api/v1/email/unsubscribe:
    post:
      tags: [Email]
      summary: Unsubscribe an email address
      description: |
        Opts an address out of ALL PowerAdSpy mailings. Runs two steps in parallel:
        adds the address to SendGrid's **global unsubscribe suppression** (stops
        delivery from every sender) and sets **aMember `unsubscribed = 1`** (so the
        daily data-report cron skips it). Public — no auth — so the unsubscribe link
        in an email works without a logged-in session. Best-effort: if one step
        fails the other still applies; per-step status is returned.
      security: []
      parameters:
        - in: query
          name: email
          required: false
          schema: { type: string, format: email }
          description: Alternative to the JSON body (direct-link friendly).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: user@example.com }
      responses:
        '200':
          description: Unsubscribed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: You have been unsubscribed }
                  email: { type: string, example: user@example.com }
                  amember: { type: object, example: { ok: true, user_id: 281 } }
                  sendgrid: { type: object, example: { ok: true } }
        '400':
          description: Missing email
        '502':
          description: Both aMember and SendGrid steps failed
    get:
      tags: [Email]
      summary: Unsubscribe via direct link (?email=)
      description: Same as POST but reads `?email=` from the query — for the unsubscribe link in mail.
      security: []
      parameters:
        - in: query
          name: email
          required: true
          schema: { type: string, format: email }
      responses:
        '200': { description: Unsubscribed }
        '400': { description: Missing email }

  /api/v1/email/resubscribe:
    post:
      tags: [Email]
      summary: Resubscribe an email address
      description: |
        Reverses an unsubscribe — removes the address from SendGrid's global
        unsubscribe list and sets aMember `unsubscribed = 0`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email, example: user@example.com }
      responses:
        '200': { description: Resubscribed }
        '400': { description: Missing email }
        '502': { description: Both steps failed }

  # ═══════════════════════════════════════════
  # FACEBOOK INSERTION
  # ═══════════════════════════════════════════

  /api/v1/facebook/insertion/metaAdsData:
    post:
      tags: [Facebook Insertion]
      summary: Insert / update a Facebook ad (metaAdsData)
      description: |
        Ingests a scraped Facebook ad. If the `ad_id` is new it is INSERTED (across
        ~15 tables + Elasticsearch `search_mix`); if it already exists its analytics
        and metadata are UPDATED. Each request is processed synchronously and returns
        the real per-ad result in milliseconds.

        Accepts a **single ad object**, a bare **array of ads**, or `{ "ads": [ ... ] }`.
        For an array, each ad is processed independently (one failure does not abort
        the rest) and the response is a batch summary.

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/MetaAdInsert'
                - type: array
                  items: { $ref: '#/components/schemas/MetaAdInsert' }
            examples:
              singleImage:
                summary: Single image ad
                value:
                  ad_id: "FB_123"
                  type: IMAGE
                  category: Retail
                  call_to_action: Shop Now
                  image_video_url: https://cdn.example.com/ad.jpg
                  ad_position: FEED
                  likes: 120
                  comment: 8
                  share: 4
                  destination_url: https://shop.example.com
                  ad_title: Summer Sale
                  news_feed_description: Up to 50% off
                  ad_text: Limited time offer
                  post_owner: Example Store
                  post_owner_image: https://cdn.example.com/page.jpg
                  platform: 5
                  version: "1.3.2"
                  first_seen: "1700000000"
                  last_seen: "1700600000"
                  country: ["US", "GB"]
                  facebook_id: "100000000000001"
      responses:
        '200':
          description: Ad inserted/updated, or batch summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsertionResponse'
        '400':
          description: Validation / business-rule failure (e.g. missing ad_id, bad version, translation error)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized signature / platform
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '402':
          description: Duplicate ad
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: Total LCS greater than views (video ads)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/facebook/insertion/delete:
    post:
      tags: [Facebook Insertion]
      summary: Securely delete a Facebook ad (SQL + Elasticsearch)
      description: |
        Deletes an ad and ALL its child rows from SQL (in one transaction) and removes
        the document from Elasticsearch `search_mix`. Port of adsDataController@deleteads.

        Identify the ad by `id` (internal facebook_ad.id) or `ad_id` (platform id).

        **Auth:** token via the `x-delete-token` header (preferred) or body `token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer, description: Internal facebook_ad.id, example: 130719 }
                ad_id: { type: string, description: Platform ad_id (used if id is absent), example: "a2eb77798761405eec0b11aef1a13906cb56fdcf" }
                token: { type: string, description: Delete token (alternative to x-delete-token header) }
            examples:
              byInternalId:
                summary: Delete by internal id
                value: { id: 130719 }
              byAdId:
                summary: Delete by platform ad_id
                value: { ad_id: "a2eb77798761405eec0b11aef1a13906cb56fdcf" }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  status: { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully !" }
                  data: { type: object, properties: { id: { type: integer, example: 130719 } } }
        '400':
          description: Missing id/ad_id, or ad not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/facebook/insertion/adsLibrary:
    post:
      tags: [Facebook Insertion]
      summary: Insert / update a Facebook Ad-Library ad (adsLibrary)
      description: |
        Ingests a Facebook **Ad Library** ad (Meta public library, `platform` default 15).
        INSERT vs UPDATE is keyed on `ad_id`. Additionally writes page-level details
        (`facebook_lib_page_details`) and budget. Country codes arrive as ISO and are
        resolved to names. Impression = average of `impressions_high`/`impressions_low`.

        Accepts a single ad, a bare array, or `{ "ads": [ ... ] }`. Synchronous, ms response.

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/AdsLibraryInsert'
                - type: array
                  items: { $ref: '#/components/schemas/AdsLibraryInsert' }
            examples:
              singleLibraryAd:
                summary: Single ad-library ad
                value:
                  ad_id: "LIB_456"
                  type: IMAGE
                  ad_position: FEED
                  post_owner: Example Brand
                  post_owner_image: https://cdn.example.com/page.jpg
                  destination_url: https://brand.example.com
                  ad_title: New Collection
                  news_feed_description: Out now
                  ad_text: Discover more
                  meta_ad_url: https://facebook.com/ads/library/?id=456
                  platform: 15
                  verified: 1
                  call_to_action: Learn More
                  first_seen: "1700000000"
                  last_seen: "1700600000"
                  est_audience_size_low: 1000
                  est_audience_size_high: 5000
                  EUT: 12000
                  ad_run_platforms: ["facebook", "instagram"]
                  currency: USD
                  impressions_low: 1000
                  impressions_high: 5000
                  country: ["US", "GB"]
                  page_details: { page_category: Retail, page_name: Example Brand }
      responses:
        '200':
          description: Ad inserted/updated, or batch summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsertionResponse'
        '400':
          description: Validation failure / no thumbnail for video / generic error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized signature / platform
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '402':
          description: Duplicate ad
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Media (video) upload failure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ═══════════════════════════════════════════
  # NATIVE INSERTION
  # ═══════════════════════════════════════════

  /api/v1/native/insertion/adsData:
    post:
      tags: [Native Insertion]
      summary: Insert or update a native ad
      description: |
        Ingests a scraped native ad (Taboola, Outbrain, etc.). If the `ad_id` is new it is
        **INSERTED** (across 15 tables + Elasticsearch `native_search_mix`); if it already
        exists its data is **UPDATED**.

        Accepts a **single ad object**, a bare **array**, or `{ "ads": [...] }`.

        **INSERT flow:**
        - 7 parallel pre-tx DB lookups (postOwner, domain, country, network, targetSite, language)
        - Single ACID transaction for all INSERT operations
        - Image downloaded (with correct CDN headers) and uploaded to NAS post-commit
        - Translation capped at 3s — insert continues without it if slow

        **UPDATE flow:**
        - Updates last_seen, days_running, countries, placement_url, network, target_site
        - Re-uploads image to NAS

        **Auth:** `platform: 12` in body bypasses signature. Or send `x-signature` header.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/NativeAdInsert'
                - type: array
                  items: { $ref: '#/components/schemas/NativeAdInsert' }
            examples:
              text_ad:
                summary: TEXT type (fastest — no image upload)
                value:
                  network: Taboola
                  type: TEXT
                  post_owner: "Test Advertiser"
                  post_owner_image: null
                  ad_title: "Best Deal Today"
                  ad_text: "Click here to learn more"
                  newsfeed_description: "Amazing product"
                  platform: 12
                  destination_url: "https://example.com"
                  ad_id: "nat_text_001"
                  city: ""
                  state: ""
                  country: "India"
                  ad_position: "FEED"
                  ad_number_position: 1
                  version: "1.0.0"
                  ip_address: "127.0.0.1"
                  source: desktop
                  target_site: "example.com"
                  image_url_original: null
                  placement_url: "https://example.com/page"
                  system_id: "sys_001"
                  first_seen: 1716000000
                  last_seen: 1716000000
                  post_date: 1716000000
              image_ad:
                summary: IMAGE type (image downloaded + uploaded to NAS)
                value:
                  network: Outbrain
                  type: IMAGE
                  post_owner: "Brand Advertiser"
                  post_owner_image: null
                  ad_title: "Shop Now"
                  ad_text: "Best offers this season"
                  newsfeed_description: ""
                  platform: 12
                  destination_url: "https://brand.com/sale"
                  ad_id: "nat_image_001"
                  city: ""
                  state: ""
                  country: "United States"
                  ad_position: "FEED"
                  ad_number_position: 2
                  version: "1.0.0"
                  ip_address: "10.0.0.1"
                  source: desktop
                  target_site: "cnn.com"
                  image_url_original: "https://cdn.example.com/ad.jpg"
                  ad_image: "https://cdn.example.com/ad.jpg"
                  placement_url: "https://cnn.com/news/article"
                  system_id: "sys_002"
                  first_seen: 1716000000
                  last_seen: 1716000000
                  post_date: 1716000000
      responses:
        '200':
          description: Ad inserted or updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsertionResponse' }
              examples:
                inserted:
                  summary: New ad inserted
                  value: { code: 200, status: ok, message: "Ad inserted successfully", data: { id: 12345 } }
                updated:
                  summary: Existing ad updated
                  value: { code: 200, status: ok, message: "Ad updated successfully", data: { id: 12345 } }
        '400':
          description: Validation error (missing fields, invalid country, empty post_owner, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
              example:
                code: 400
                status: rejected
                message: "Validation failed — 1 field(s) need fixing."
                errors: ["The country field must not be empty."]
        '401':
          description: Unauthorized — invalid or missing x-signature and platform bypass not allowed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '402':
          description: Duplicate ad_id (already exists — no update was triggered)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for native network (config.networks.native.insertion.enabled = false)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error during insertion
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/native/insertion/delete:
    post:
      tags: [Native Insertion]
      summary: Delete a native ad (cascade SQL + Elasticsearch)
      description: |
        Deletes a native ad and ALL its child rows from MySQL in one atomic transaction,
        then removes the document from Elasticsearch `native_search_mix`.

        Port of PHP `NativeAdController::deleteads()`.

        **Child tables deleted:** native_ad_html_lander_content, native_ad_translation,
        native_ad_countries, native_ad_countries_only, native_hidden_ads,
        native_ad_image_video, native_ad_meta_data, native_ad_network,
        native_ad_outgoing_links, native_ad_url, native_ad_variants,
        native_placement_url, native_ad_target_site, native_ad_recommended_activity.

        Identify by `id` (internal `native_ad.id`) **or** `ad_id` (platform id).

        **Auth:** `x-delete-token` header **or** `body.token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NativeAdDelete' }
            examples:
              by_ad_id:
                summary: Delete by platform ad_id
                value: { ad_id: "nat_text_001" }
              by_internal_id:
                summary: Delete by internal id
                value: { id: 12345 }
      responses:
        '200':
          description: Ad and all child rows deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:    { type: integer, example: 200 }
                  status:  { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully!" }
                  data:    { type: object, properties: { id: { type: integer, example: 12345 } } }
        '400':
          description: Ad not found or missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for native network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error during deletion
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ═══════════════════════════════════════════
  # PINTEREST INSERTION
  # ═══════════════════════════════════════════

  /api/v1/pinterest/insertion/pintAdsData:
    post:
      tags: [Pinterest Insertion]
      summary: Insert or update a Pinterest ad
      description: |
        Port of PHP `adsController@insertAds`. Accepts Image and Video types.

        **PHP-exact INSERT flow:**
        1. Media (image/thumbnail) uploaded to NAS FIRST using Pinterest CDN headers (Referer + User-Agent)
        2. If NAS upload fails → return 500, zero DB writes
        3. Parallel pre-tx DB lookups (postOwner, domain, country, countryOnly, language)
        4. Single ACID transaction with real NAS URL already in variant
        5. Post-owner image also uploaded with Pinterest headers

        **UPDATE flow:** Updates last_seen, days_running, re-uploads media, appends target_keyword.

        **Video:** Only thumbnail uploaded to NAS — `ad_video` URL stored as `image_url_original` only.

        **Auth:** `platform: 12` in body bypasses x-signature.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [post_owner, network, type, platform, ad_id, ad_position, version, source, country]
              properties:
                post_owner:           { type: string, example: "Mejuri" }
                network:              { type: string, example: "Pinterest" }
                type:                 { type: string, enum: [Image, Video, IMAGE, VIDEO], example: Image }
                post_owner_image:     { type: string, nullable: true, example: "https://i.pinimg.com/75x75_RS/..." }
                ad_title:             { type: string, nullable: true, example: "Our Biggest Sale Ever" }
                ad_text:              { type: string, nullable: true, example: "mejuri.com" }
                ad_image:             { type: string, nullable: true, description: "Required for Image type — uploaded to NAS with Pinterest headers" }
                ad_video:             { type: string, nullable: true, description: "Video URL — stored as image_url_original, NOT uploaded to NAS" }
                thumbnail_url:        { type: string, nullable: true, description: "Required for Video type — uploaded to NAS as THUMBNAIL" }
                platform:             { type: integer, example: 12, description: "12 bypasses x-signature auth" }
                destination_url:      { type: string, nullable: true }
                ad_id:                { type: string, example: "pint_test_001" }
                city:                 { type: string, nullable: true, example: "New York" }
                state:                { type: string, nullable: true, example: "New York" }
                country:              { type: string, example: "United States", description: "Cannot be empty" }
                ad_position:          { type: string, example: "Feed" }
                ad_sub_position:      { type: string, nullable: true }
                target_keyword:       { type: string, nullable: true, example: "fashion", description: "On UPDATE, appended with | separator if new" }
                version:              { type: string, example: "1.0.1" }
                ip_address:           { type: string, nullable: true, example: "127.0.0.1" }
                source:               { type: string, enum: [desktop, android, ios], example: desktop }
                post_date:            { type: integer, example: 1733111754000, description: "Milliseconds epoch — divided by 1000 internally" }
                other_multimedia:     { type: string, nullable: true, description: "Pipe-delimited extra image URLs for carousel" }
            examples:
              image_ad:
                summary: IMAGE type ad
                value:
                  post_owner: "Mejuri"
                  network: Pinterest
                  type: Image
                  platform: 12
                  ad_id: "pint_image_001"
                  ad_title: "Our Biggest Sale Ever"
                  ad_text: "mejuri.com"
                  ad_image: "https://i.pinimg.com/originals/sample.jpg"
                  post_owner_image: "https://i.pinimg.com/75x75_RS/sample.jpg"
                  destination_url: "https://mejuri.com/sale"
                  ad_position: Feed
                  country: "United States"
                  source: desktop
                  version: "1.0.1"
                  ip_address: "127.0.0.1"
                  target_keyword: "jewelry"
                  post_date: 1733111754000
                  newsfeed_description: ""
                  city: ""
                  state: ""
              video_ad:
                summary: VIDEO type ad (thumbnail uploaded to NAS, video URL stored as-is)
                value:
                  post_owner: "testpint"
                  network: Pinterest
                  type: Video
                  platform: 12
                  ad_id: "pint_video_001"
                  ad_title: "Watch This"
                  ad_text: "brand.com"
                  ad_video: "https://example.com/video.mp4"
                  thumbnail_url: "https://i.pinimg.com/originals/thumb.jpg"
                  post_owner_image: "https://i.pinimg.com/75x75_RS/owner.jpg"
                  destination_url: "https://brand.com"
                  ad_position: Feed
                  country: "United States"
                  source: desktop
                  version: "1.0.1"
                  ip_address: "127.0.0.1"
                  post_date: 1733111754000
                  newsfeed_description: ""
                  city: ""
                  state: ""
      responses:
        '200':
          description: Ad inserted or updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsertionResponse' }
              examples:
                inserted: { summary: New ad inserted, value: { code: 200, status: ok, message: "Ad inserted successfully", data: { id: 107158 } } }
                updated:  { summary: Existing ad updated, value: { code: 200, status: ok, message: "Ad already present — existing data updated (id 107158)", data: { id: 107158 } } }
        '400':
          description: Validation error (empty country, missing thumbnail for Video, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized — missing x-signature and platform bypass not set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for Pinterest network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: NAS upload failed — no DB writes made
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/pinterest/insertion/delete:
    post:
      tags: [Pinterest Insertion]
      summary: Delete a Pinterest ad (cascade SQL + Elasticsearch)
      description: |
        Deletes a Pinterest ad and all child rows from MySQL in one transaction,
        then removes the document from `pinterest_search_mix`.

        Pass `id` (internal `pinterest_ad.id`) **or** `ad_id` (platform id).

        **Auth:** `x-delete-token` header or `body.token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:    { type: integer, example: 107158, description: "Internal pinterest_ad.id" }
                ad_id: { type: string,  example: "pint_image_001", description: "Platform ad_id" }
            examples:
              by_ad_id:      { summary: By platform ad_id, value: { ad_id: "pint_image_001" } }
              by_internal_id: { summary: By internal id,   value: { id: 107158 } }
      responses:
        '200':
          description: Ad deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:    { type: integer, example: 200 }
                  status:  { type: string,  example: ok }
                  message: { type: string,  example: "Data is deleted successfully!" }
                  data:    { type: object,  properties: { id: { type: integer, example: 107158 } } }
        '400':
          description: Ad not found or missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

