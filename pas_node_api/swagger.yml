  # ═══════════════════════════════════════════
  # TIKTOK — Search, Count & Insights
  # ═══════════════════════════════════════════

  /api/v1/tiktok/ads/search:
    post:
      tags: [TikTok]
      summary: Search TikTok ads
      description: |
        Search TikTok ads with filters. Queries the `tiktok_ads` ES index.
        Supports industry, gender, age, budget, language, CTR filters.
        Uses collapse on `sql_id` for deduplication.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                keyword:
                  type: string
                advertiser:
                  type: string
                domain:
                  type: string
                industry:
                  type: array
                  items:
                    type: string
                country:
                  type: array
                  items:
                    type: string
                gender:
                  type: array
                  items:
                    type: string
                age:
                  type: array
                  items:
                    type: string
                budget:
                  type: array
                  items:
                    type: string
                language:
                  type: array
                  items:
                    type: string
                likes:
                  type: object
                  properties:
                    min:
                      type: integer
                    max:
                      type: integer
                comments:
                  type: object
                  properties:
                    min:
                      type: integer
                    max:
                      type: integer
                shares:
                  type: object
                  properties:
                    min:
                      type: integer
                    max:
                      type: integer
                ctr:
                  type: object
                  properties:
                    min:
                      type: number
                    max:
                      type: number
                sortBy:
                  type: string
                  enum: [Newest, LastSeen, domain_date, days_running]
                skip:
                  type: integer
                  default: 0
                limit:
                  type: integer
                  default: 10
            examples:
              basic:
                summary: Basic keyword search
                value:
                  keyword: ecommerce
                  limit: 20
                  skip: 0
                  sortBy: Newest
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized

  /api/v1/tiktok/ads/count:
    get:
      tags: [TikTok]
      summary: Get total TikTok ad count
      description: Returns the total number of TikTok ads in the Elasticsearch index.
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Ad count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
