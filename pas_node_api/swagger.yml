  # ═══════════════════════════════════════════
  # YOUTUBE INSERTION
  # ═══════════════════════════════════════════

  /api/v1/youtube/insertion/ytAdsData:
    post:
      tags: [YouTube Insertion]
      summary: Insert / update a YouTube ad (ytAdsData)
      description: |
        Ingests a scraped YouTube ad. If the `ad_id` is new it is INSERTED (across the youtube_*
        tables + Elasticsearch `youtube_ads_data`); if it already exists its data is UPDATED
        (last_seen, days_running, likes/dislikes/comments/views, analytics, country counts). Each
        request is processed synchronously and returns the real per-ad result in milliseconds.

        Accepts a **single ad object**, a bare **array of ads**, or `{ "ads": [ ... ] }`.

        **Ad types:** `IMAGE, VIDEO, TEXT, RESPONSIVE, DISPLAY, DISCOVERY, TEXT_IMAGE`.
        (`BANNER` is a separate legacy flow and is NOT supported here.)

        **Media:** IMAGE/DISPLAY → the ad image is uploaded to NAS (`yt/adImage`); other types →
        the `thumbnail` is uploaded to NAS (`yt/thumbnail`) and becomes `video_url`; the raw video
        URL is kept in `video_url_original`. Files are named by the internal `youtube_ad.id`.

        **YouTube specifics:** `ad_id` is a string; the ES doc is FLAT (no `youtube_ad.` prefix) with
        date fields as UNIX **epoch integers**; the ES `_id` IS the internal `youtube_ad.id`;
        `reactions` is an object `{ likes }`. `post_date` is not required for SEARCHFEED_DISCOVERY /
        HOMEFEED_DISCOVERY / COMPANION positions. SHORTS ads require `destination_url`.
        Platform 12 (python plugin) does the system_id / account-activity bookkeeping.
        NOTE: the mp4 video→S3 upload and `youtube_ad_budget` (VIDEO/DISCOVERY budget) are not ported.

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
            examples:
              videoP12:
                summary: VIDEO ad (platform-12 bypass — no signature needed)
                value:
                  network: YouTube
                  type: VIDEO
                  post_owner: Zipify Apps
                  post_owner_image: https://yt3.ggpht.com/xQ6Y50...=s48-c-k-c0x00ffffff-no-rj
                  ad_title: "GOOD$ELLAS (Ecommerce Goodfellas Parody) | Zipify"
                  ad_text: ""
                  newsfeed_description: "Do YOU want to be a GOOD$ELLA? ..."
                  ad_url: https://www.youtube.com/watch?v=-LFHyIR5r8g
                  ad_image: https://www.youtube.com/watch?v=-LFHyIR5r8g
                  thumbnail: https://img.youtube.com/vi/-LFHyIR5r8g/maxresdefault.jpg
                  platform: "12"
                  destination_url: https://zipify.com/apps/ocu/
                  ad_id: "yt_test_video_0001"
                  likes: 752
                  dislike: 0
                  views: 1523196
                  comment: 8
                  category: ""
                  city: Tucson
                  state: Arizona
                  country: United States
                  lower_age: 18
                  upper_age: 65
                  ad_position: IN-STREAM
                  version: "1.0.0"
                  ip_address: 72.223.125.74
                  source: desktop
                  call_to_action: ""
                  post_date: null
                  first_seen: ""
                  last_seen: ""
                  othermedia: ""
                  system_id: Proxmox-17
              imageP12:
                summary: IMAGE / SEARCHFEED_DISCOVERY ad (platform-12 bypass)
                value:
                  network: YouTube
                  type: IMAGE
                  post_owner: TurboTax
                  post_owner_image: ""
                  ad_title: Tech for brainstorms and big wins
                  ad_image: https://lh6.googleusercontent.com/proxy/VfaPTam...
                  ad_url: https://lh6.googleusercontent.com/proxy/VfaPTam...
                  thumbnail: https://lh6.googleusercontent.com/proxy/VfaPTam...
                  platform: "12"
                  destination_url: https://turbotax.intuit.com/lp/bn/1709/
                  ad_id: "yt_test_0001"
                  likes: 0
                  dislike: 0
                  views: 0
                  comment: 0
                  category: ""
                  city: Henrico
                  state: Virginia
                  country: United States
                  lower_age: 18
                  upper_age: 65
                  ad_position: SEARCHFEED_DISCOVERY
                  ad_text: Your taxes done right. Get the TurboTax app.
                  version: "1.0.0"
                  ip_address: 109.175.191.56
                  source: desktop
                  call_to_action: Learn more
                  post_date: ""
                  first_seen: ""
                  last_seen: ""
                  othermedia: ""
                  system_id: Proxmox-17
      responses:
        '200':
          description: Ad inserted/updated, or batch summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsertionResponse'
        '400':
          description: Validation / business-rule failure (e.g. missing ad_id, bad version, SHORTS without destination_url)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized signature / platform
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error while saving (DB / Elasticsearch / NAS media)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/youtube/insertion/delete:
    post:
      tags: [YouTube Insertion]
      summary: Securely delete a YouTube ad (SQL + Elasticsearch)
      description: |
        Deletes an ad and ALL its child rows from SQL (one transaction, FK-aware cascade) and
        removes the doc from Elasticsearch `youtube_ads_data`. Port of YoutubeAdController@deleteads.

        Identify the ad by `id` (internal youtube_ad.id) or `ad_id` (platform id). The ES `_id`
        equals the internal `youtube_ad.id`, so the ES doc is deleted by that id directly.

        **Auth:** token via the `x-delete-token` header (preferred) or body `token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer, description: Internal youtube_ad.id, example: 291367 }
                ad_id: { type: string, description: Platform ad_id (used if id is absent), example: "-LFHyIR5r8g" }
                token: { type: string, description: Delete token (alternative to x-delete-token header) }
            examples:
              byInternalId:
                summary: Delete by internal id
                value: { id: 291367 }
              byAdId:
                summary: Delete by platform ad_id
                value: { ad_id: "-LFHyIR5r8g" }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  status: { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully !" }
                  data: { type: object, properties: { id: { type: integer, example: 291367 } } }
        '400':
          description: Missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Ad not present in database, or insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

