  # ═══════════════════════════════════════════
  # COMMON
  # ═══════════════════════════════════════════

  /api/v1/common/ads/getAdInsights:
    post:
      tags: [Common]
      summary: Combined ad insights — SSE streaming (all networks)
      description: |
        Fetches all ad insight data for a given network in one call via **Server-Sent Events (SSE)**.
        All fetchers fire in parallel; each streams its result as an SSE event the moment it resolves.
        A per-fetcher 2 s timeout ensures slow queries never block the rest.

        **`network` parameter** selects the platform controller:
        `facebook` (default), `instagram`, `pinterest`, `youtube`, `gdn`, `google`, `native`, `linkedin`, `reddit`, `quora`, `tiktok`

        ### SSE event format
        ```
        event: <key>
        data: {"code":200,"data":{...}}

        event: done
        data: {"code":200,"message":"All insights complete"}
        ```

        ### Events per network

        | Network   | Ad ID param        | adDetails | lcs | country | outgoingLinks | userData | advertiserLCSData | advertiserCountryData | advertiserUserData | pageDetails | adsLibUserData |
        |-----------|--------------------| :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: | :---: |
        | facebook  | facebook_ad_id     | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓* | — |
        | instagram | instagram_ad_id    | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | — | — | ✓ |
        | youtube   | youtube_ad_id      | ✓ | ✓ | ✓ | ✓ | — | ✓ | ✓ | — | — | — |
        | linkedin  | linkedin_ad_id     | ✓ | ✓ | ✓ | ✓ | — | ✓ | ✓ | — | — | — |
        | reddit    | reddit_ad_id       | ✓ | ✓ | ✓ | ✓ | — | ✓ | ✓ | — | — | — |
        | pinterest | pinterest_ad_id    | ✓ | — | ✓ | ✓ | — | — | ✓ | — | — | — |
        | gdn       | gdn_ad_id          | ✓ | — | ✓ | ✓ | — | — | ✓ | — | — | — |
        | google    | google_text_ad_id  | ✓ | — | ✓ | ✓ | — | — | ✓ | — | — | — |
        | native    | native_ad_id       | ✓ | ✓ | ✓ | — | — | — | — | — | — | — |
        | quora     | quora_ad_id        | ✓ | — | ✓ | ✓ | ✓ | — | ✓ | — | — | — |
        | tiktok    | tiktok_ad_id       | — | ✓ | — | — | — | — | — | — | — | — |

        **TikTok additional events:** `analytics`, `industries`

        
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                network:
                  type: string
                  enum: [facebook, instagram, pinterest, youtube, gdn, google, native, linkedin, reddit, quora, tiktok]
                  default: facebook
                  description: Target ad network
                facebook_ad_id:
                  type: integer
                  example: 123456
                  description: Required when network = facebook
                instagram_ad_id:
                  type: integer
                  description: Required when network = instagram
                pinterest_ad_id:
                  type: integer
                  description: Required when network = pinterest
                youtube_ad_id:
                  type: integer
                  description: Required when network = youtube
                gdn_ad_id:
                  type: integer
                  description: Required when network = gdn
                google_text_ad_id:
                  type: integer
                  description: Required when network = google
                native_ad_id:
                  type: integer
                  description: Required when network = native
                linkedin_ad_id:
                  type: integer
                  description: Required when network = linkedin
                reddit_ad_id:
                  type: integer
                  description: Required when network = reddit
                quora_ad_id:
                  type: integer
                  description: Required when network = quora
                tiktok_ad_id:
                  type: integer
                  description: Required when network = tiktok
                user_id:
                  type: integer
                  example: 281
                language:
                  type: string
                  description: Optional language code for translations
                  example: en
                platform:
                  type: integer
                  description: Facebook only — pass 15 to also fetch pageDetails
                  example: 15
            examples:
              facebook:
                summary: Facebook insights
                value: { network: facebook, facebook_ad_id: 123456, user_id: 281 }
              instagram:
                summary: Instagram insights
                value: { network: instagram, instagram_ad_id: 78901, user_id: 281 }
              pinterest:
                summary: Pinterest insights
                value: { network: pinterest, pinterest_ad_id: 55001, user_id: 281 }
              youtube:
                summary: YouTube insights
                value: { network: youtube, youtube_ad_id: 44001, user_id: 281 }
              gdn:
                summary: GDN insights
                value: { network: gdn, gdn_ad_id: 33001, user_id: 281 }
              google:
                summary: Google insights
                value: { network: google, google_text_ad_id: 22001, user_id: 281 }
              native:
                summary: Native insights
                value: { network: native, native_ad_id: 66001, user_id: 281 }
              linkedin:
                summary: LinkedIn insights
                value: { network: linkedin, linkedin_ad_id: 77001, user_id: 281 }
              reddit:
                summary: Reddit insights
                value: { network: reddit, reddit_ad_id: 88001, user_id: 281 }
              quora:
                summary: Quora insights
                value: { network: quora, quora_ad_id: 99001, user_id: 281 }
              tiktok:
                summary: TikTok insights
                value: { network: tiktok, tiktok_ad_id: 11001, user_id: 281 }
      responses:
        '200':
          description: SSE stream of insight events
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Server-Sent Events stream. Each event has:
                  - `event:` line with the insight key
                  - `data:` line with JSON `{ code, data }`

                  Possible event keys per network (see table above):
                  `adDetails`, `lcs`, `country`, `outgoingLinks`, `userData`,
                  `advertiserLCSData`, `advertiserCountryData`, `advertiserUserData`,
                  `pageDetails`, `adsLibUserData`, `analytics`, `industries`, `done`
              example: |
                event: adDetails
                data: {"code":200,"data":{"id":123,"title":"Ad title",...}}

                event: lcs
                data: {"code":200,"data":[{"date":"2025-01-01","likes":10,"comments":5,"shares":2}]}

                event: country
                data: {"code":200,"data":[{"country":"United States","iso":"US"}]}

                event: outgoingLinks
                data: {"code":200,"data":[{"source_url":"...","redirect_url":"...","final_url":"..."}]}

                event: done
                data: {"code":200,"message":"All insights complete"}
        '400':
          description: Unsupported network
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: "Unsupported network: unknown. Available: facebook, instagram, pinterest, youtube, gdn, google, native, linkedin, reddit, quora, tiktok"
        '401':
          description: Missing required parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 401
                  message:
                    type: string
                    example: "Missing parameters: facebook_ad_id and user_id are required"
        '503':
          description: Network service not available
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 503
                  message:
                    type: string
                    example: "Facebook service not available"

  /api/v1/common/ads/search:
    post:
      tags: [Common]
      summary: Cross-network ad search
      description: |
        Searches **Facebook, Instagram, and YouTube** simultaneously and merges results via round-robin interleave.
        Accepts the same filter body as the individual network endpoints.

        Use the `network` field to target specific networks:
        - Omit or `"all"` → query all three networks
        - `"facebook"` / `"instagram"` / `"youtube"` → single network
        - `"facebook,instagram"` → comma-separated for a subset

        `meta.total` always contains counts for **all** networks regardless of the `network` filter.
        `meta.suggestedNetworks` is non-empty when your selected network returned 0 results but others have data.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacebookSearchRequest'
            examples:
              all_networks:
                summary: Search all networks
                value:
                  keyword: fitness
                  take: 20
                  skip: 0
                  newest_sort: desc
              youtube_only:
                summary: YouTube only
                value:
                  keyword: fitness
                  network: youtube
                  take: 20
                  skip: 0
                  views_sort: desc
      responses:
        '200':
          description: Merged search results from all networks (Facebook + Instagram + YouTube)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/common/recent-ads:
    get:
      tags: [Common]
      summary: Recent ads across all networks
      description: |
        Returns the most recently-seen ads across **all networks**
        (facebook, instagram, google, gdn, youtube, pinterest, native, linkedin,
        reddit, quora, tiktok) in one fan-out call, merged and sorted newest-first.

        **"Recent"** = ads whose `last_seen` falls within the last `days` days.
        Default window is **1 day** (ads seen in the last 24h); pass `days` to widen it.

        Each network runs through its own `searchAds` pipeline — the same one
        `/api/v1/common/ads/search` uses — so every ad comes back **fully hydrated**
        (images, text, title, advertiser, URLs), not just raw Elasticsearch fields.
        Results are merged and sorted newest-first across networks. Per-network
        failures/timeouts are isolated and surfaced in `meta.errors` without failing
        the whole response.
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, default: 1, minimum: 1, maximum: 90 }
          description: Look-back window in days. Default 1, max 90.
        - name: network
          in: query
          required: false
          schema: { type: string, default: all }
          description: |
            `all` (default), a single network, or a comma-separated subset
            (e.g. `facebook,google`). Unknown names are ignored and echoed back
            in `meta.ignoredNetworks`.
          example: facebook,google
        - name: limit
          in: query
          required: false
          schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
          description: Max ads returned **per network**. Default 20, max 100.
      responses:
        '200':
          description: Merged recent ads, newest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecentAdsResponse'
        '400':
          description: No valid network requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/common/get-ad-details/{adId}:
    get:
      tags: [Common]
      summary: Lightweight ad details card by ad ID
      description: |
        Node port of the PHP `Userv2Controller@getAdDetailsData`. Looks up a single
        Facebook ad in the `search_mix` Elasticsearch index by `facebook_ad.id` and
        returns a trimmed card: `title`, `text`, `newsfeed_description`, `image_url`,
        `category`, `subcategory`.

        - **IMAGE** ads use `new_nas_image_url`; everything else falls back to
          `thumbnail_url`. The chosen path is prefixed with the `NAS_URL_FE` env value.
        - **No auth** — the original PHP route carried only the `cors` middleware.
        - **Always responds HTTP 200** (mirrors Laravel `response()->json()`); the real
          status is in the body `code` (`200` = found, `404` = no ad, `400` = error).
      security: []
      parameters:
        - name: adId
          in: path
          required: true
          schema: { type: string }
          description: Facebook ad id (`facebook_ad.id`).
          example: "1234567890"
      responses:
        '200':
          description: |
            Always HTTP 200. Inspect the body `code`: `200` = found, `404` = no ad for
            the given id, `400` = error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Data Fetched Successfully }
                  data:
                    type: object
                    properties:
                      title: { type: string, example: "Summer Sale" }
                      text: { type: string, example: "Up to 50% off everything" }
                      newsfeed_description: { type: string, example: "Limited time offer" }
                      image_url: { type: string, example: "https://nas.example.com/ads/1/img.jpg" }
                      category: { type: string, example: "E-commerce" }
                      subcategory: { type: string, example: "Apparel" }
              examples:
                found:
                  summary: Ad found
                  value:
                    code: 200
                    message: Data Fetched Successfully
                    data:
                      title: "Summer Sale"
                      text: "Up to 50% off everything"
                      newsfeed_description: "Limited time offer"
                      image_url: "https://nas.example.com/ads/1/img.jpg"
                      category: "E-commerce"
                      subcategory: "Apparel"
                notFound:
                  summary: No ad for the given id
                  value:
                    code: 404
                    message: No data found for the given ad_id
                error:
                  summary: Lookup error
                  value:
                    code: 400
                    message: "Error in getAdDetailsData: <reason>"

  /api/v1/common/authunticate-php-api:
    get:
      tags: [Common]
      summary: Validate a PHP-issued JWT
      description: |
        Node port of the PHP `adsDataController@authunticatePhpApi`. Verifies the
        `Bearer` token in the `Authorization` header against the shared HS512 JWT
        secret (the same value PHP uses via `config('services.jwt.key')`). Lets other
        services check a token without a full auth context.

        - **No auth middleware** — the endpoint validates the supplied token itself
          (use the **Authorize** button to send the `Bearer` token to test).
        - **Always responds HTTP 200** (mirrors Laravel `response()->json()`); the real
          outcome is in the body `code` / `message`:
          - `403` "Bearer token required" — missing / non-Bearer header
          - `200` "valid token" — signature ok and not expired
          - `400` "Token expired" — expired token
          - `400` "Invalid token signature" — signature mismatch
          - `400` "Malformed token" — unparseable token
          - `400` "Invalid token" — any other failure
      responses:
        '200':
          description: |
            Always HTTP 200. Inspect the body `code`: `200` = valid, `403` = no bearer
            token, `400` = expired / bad signature / malformed / invalid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: valid token }
              examples:
                valid:
                  summary: Valid token
                  value: { code: 200, message: valid token }
                missing:
                  summary: No bearer token
                  value: { code: 403, message: Bearer token required }
                expired:
                  summary: Expired token
                  value: { code: 400, message: Token expired }
                badSignature:
                  summary: Bad signature
                  value: { code: 400, message: Invalid token signature }
                malformed:
                  summary: Malformed token
                  value: { code: 400, message: Malformed token }

