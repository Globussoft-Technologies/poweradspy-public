        '401':
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/tiktok/ads/getAdvertiserLCSData:
    post:
      tags: [TikTok]
      summary: Get advertiser-level monthly LCS data
      description: |
        Fetches monthly likes, comments, and shares aggregated by advertiser for a specific year.
        The advertiser is identified via the ad's `post_owner_id` looked up from ES using `tiktok_ad_id`.
        Default year is derived from the ad's `last_seen` date.
        LCS values are read directly from the ES document (no SQL join needed).
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tiktok_ad_id]
              properties:
                tiktok_ad_id:
                  type: integer
                  example: 123456
                  description: SQL ID of the TikTok ad (used to resolve the advertiser)
                year:
                  type: integer
                  example: 2024
                  description: Year to fetch data for (defaults to the ad's last_seen year)
                user_id:
                  type: integer
                  example: 281
      responses:
        '200':
          description: Monthly LCS data grouped by month_year key
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  post_owner_id:
                    type: integer
                    example: 73
                  year:
                    type: integer
                    example: 2024
                  available_years:
                    type: array
                    items:
                      type: integer
                    example: [2023, 2024]
                  data:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        ad_ids:
                          type: array
                          items:
                            type: integer
                        total_ads:
                          type: integer
                        likes:
                          type: integer
                        comments:
                          type: integer
                        shares:
                          type: integer
                    example:
                      jul_2024:
                        ad_ids: [123456, 123457]
                        total_ads: 2
                        likes: 68877
                        comments: 190
                        shares: 291
        '400':
          description: Ad not found or advertiser not found
        '401':
          description: Missing tiktok_ad_id
        '503':
          description: Search service not available

  /api/v1/tiktok/ads/getAdvertiserCountryData:
    post:
      tags: [TikTok]
      summary: Get advertiser-level country data
      description: |
        Fetches country-level ad counts for a TikTok advertiser for a specific year.
        The advertiser is identified via the ad's `post_owner_id` looked up from ES using `tiktok_ad_id`.
        Countries are ISO codes (e.g. `FR`, `CH`) stored directly in the ES document.
        Default year is derived from the ad's `last_seen` date.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tiktok_ad_id]
              properties:
                tiktok_ad_id:
                  type: integer
                  example: 123456
                  description: SQL ID of the TikTok ad (used to resolve the advertiser)
                year:
                  type: integer
                  example: 2024
                  description: Year to fetch data for (defaults to the ad's last_seen year)
                user_id:
                  type: integer
                  example: 281
      responses:
        '200':
          description: Country data with ad counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  post_owner_id:
                    type: integer
                    example: 73
                  year:
                    type: integer
                    example: 2024
                  available_years:
                    type: array
                    items:
                      type: integer
                    example: [2023, 2024]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        iso:
                          type: string
                          example: FR
                          description: ISO 3166-1 alpha-2 country code
                        ad_ids:
                          type: array
                          items:
                            type: integer
                        ad_count:
                          type: integer
        '400':
          description: Ad not found or advertiser not found
        '401':
          description: Missing tiktok_ad_id
        '503':
          description: Search service not available

  /api/v1/tiktok/ads/getAdvertiserInsightsByDateRange:
    post:
      tags: [TikTok]
      summary: Get advertiser insights by date range
      description: |
        Fetches country or LCS data for a TikTok advertiser within a custom date range.
        The advertiser is identified by `post_owner_id` (available from ES search results).
        - `type=country` — returns per-country ad counts (ISO codes)
        - `type=lcs` — returns monthly likes, comments, shares aggregated from ES
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [post_owner_id, from_date, to_date]
              properties:
                post_owner_id:
                  type: integer
                  example: 73
                  description: Advertiser ID from ES field post_owner_id
                from_date:
                  type: string
                  format: date
                  example: "2024-01-01"
                to_date:
                  type: string
                  format: date
                  example: "2024-12-31"
                type:
                  type: string
                  enum: [country, lcs]
                  default: country
                  example: country
                user_id:
                  type: integer
                  example: 281
      responses:
        '200':
          description: Insight data (country array or monthly LCS object)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  post_owner_id:
                    type: integer
                    example: 73
                  from_date:
                    type: string
                    example: "2024-01-01"
                  to_date:
                    type: string
                    example: "2024-12-31"
                  data:
                    oneOf:
                      - type: array
                        description: Country data (type=country)
                        items:
                          type: object
                          properties:
                            iso:
                              type: string
                              example: FR
                            ad_ids:
                              type: array
                              items:
                                type: integer
                            ad_count:
                              type: integer
                      - type: object
                        description: Monthly LCS data (type=lcs)
                        additionalProperties:
                          type: object
                          properties:
                            ad_ids:
                              type: array
                              items:
                                type: integer
                            total_ads:
                              type: integer
                            likes:
                              type: integer
                            comments:
                              type: integer
                            shares:
                              type: integer
        '400':
          description: Advertiser not found, no data, or invalid parameters
        '401':
          description: Missing required parameters
        '503':
          description: Search service not available

  # ─── Plan Access Admin ────────────────────────────────────────────────────────

  /admin/api/plan-access/config:
    get:
      tags:
        - Plan Access (Admin)
      summary: Get full plan access config
      description: |
        Returns all plan access data from MongoDB — filter docs, platform access,
        competitor limits, and the plan_groups document (group → plan ID mapping).
        Seeds `plan_groups` to MongoDB automatically if it does not exist yet.
      responses:
        '200':
          description: Plan access config loaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      filterDocs:
                        type: array
                        items:
                          type: object
                        description: Per-filter plan access documents
                      platformAccessDoc:
                        type: object
                        description: Platform → allowed plan IDs mapping
                      competitorLimitsDoc:
                        type: object
                        description: Per-plan brand and competitor limits
                      planGroupsDoc:
                        type: object
                        description: Group name → color + plan ID array mapping
                        example:
                          _id: plan_groups
                          groups:
                            Free:
                              color: "#94a3b8"
                              plans: [20]
                            Basic:
                              color: "#6366f1"
                              plans: [2, 5, 9]
        '500':
          description: Server error

  /admin/api/plan-access/add-plan:
    post:
      tags:
        - Plan Access (Admin)
      summary: Add a new plan ID
      description: |
        Copies filter access, platform access, and competitor limits from a reference
        plan to a new plan ID. Also updates the `plan_groups` document in MongoDB
        to persist the group membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPlanId, refPlanId, group]
              properties:
                newPlanId:
                  type: integer
                  description: The new plan ID to create
                  example: 999
                refPlanId:
                  type: integer
                  description: An existing plan ID in the same group to copy access from
                  example: 3
                group:
                  type: string
                  description: The group this plan belongs to
                  example: Standard
      responses:
        '200':
          description: Plan added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Plan 999 added with access copied from plan 3
        '400':
          description: Missing required fields
        '500':
          description: Server error

  /admin/api/plan-access/plan/{id}:
    delete:
      tags:
        - Plan Access (Admin)
      summary: Soft-delete a plan ID
      description: |
        Marks the plan as deleted in `plan_groups.deleted_plan_ids`.
        Users on this plan immediately lose all access (planAccessService enforces it).
        All filter/platform/limit mapping data is preserved — the plan can be fully restored.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Plan ID to soft-delete
          example: 5
      responses:
        '200':
          description: Plan soft-deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Plan 5 soft-deleted. Users on this plan will lose access.
        '404':
          description: Plan ID not found in any group
        '409':
          description: Plan is already soft-deleted
        '500':
          description: Server error

  /admin/api/plan-access/restore-plan/{id}:
    post:
      tags:
        - Plan Access (Admin)
      summary: Restore a soft-deleted plan ID
      description: |
        Removes the plan from `plan_groups.deleted_plan_ids`.
        User access is immediately re-enabled — all original mapping is still intact.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Plan ID to restore
          example: 5
      responses:
        '200':
          description: Plan restored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Plan 5 restored to group Basic. User access is re-enabled.
        '404':
          description: Plan ID is not soft-deleted
        '500':
          description: Server error

  /admin/api/plan-access/check-id/{id}:
    get:
      tags:
        - Plan Access (Admin)
      summary: Check if a plan ID already exists
      description: Checks platform_access, competitor_limits, and filter docs for the given plan ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Plan ID to check
          example: 999
      responses:
        '200':
          description: Check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  exists:
                    type: boolean
                    example: false
        '500':
          description: Server error

  /api/v1/common/getDescriptionDetails:
    get:
      tags:
        - Category (Internal)
      summary: Get ad description details for AI category mapping
      description: |
        Fetches ads from the platform-specific ES index with id > exVal.
        Returns text, title, image, and OCR data used for AI category assignment.
        Internal endpoint — no auth required.
      parameters:
        - in: query
          name: platform
          required: true
          schema:
            type: string
            enum: [facebook, instagram, youtube, gdn, google, native, linkedin, quora, reddit, pinterest]
          example: facebook
        - in: query
          name: exVal
          required: false
          schema:
            type: number
            default: 0
          description: Fetch ads with id greater than this value
          example: 0
        - in: query
          name: limit
          required: false
          schema:
            type: number
            default: 150
          description: Number of records to return
          example: 10
      responses:
        '200':
          description: Array of ad description data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: number
                      example: 123456
                    ad_text:
                      type: string
                      example: "Buy now and save 50%!"
                    ad_title:
                      type: string
                      example: "Summer Sale"
                    post_owner_name:
                      type: string
                      example: "Brand Name"
                    news_feed_description:
                      type: string
                      example: "Limited time offer"
                    ocr:
                      type: string
                      example: "50% OFF"
                    ad_image:
                      type: string
                      example: "/PowerAdspy/images/abc.jpg"
                    thumbnail:
                      type: string
                      example: "/PowerAdspy/thumbs/abc.jpg"
        '400':
          description: Invalid or missing platform
        '503':
          description: ES not available for the given platform

  /api/v1/common/newCatInsertion:
    post:
      tags:
        - Category (Internal)
      summary: Insert or update a category and sync to MongoDB
      description: |
        Inserts or updates a category in the master ES `category` index,
        updates the ad record in search_mix, then syncs to MongoDB sdui_config
        so the React filter dropdown stays up to date.
        Internal endpoint — no auth required.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, category, category_id, ad_id]
              properties:
                platform:
                  type: string
                  enum: [facebook, instagram, youtube, gdn, google, native, linkedin, quora, reddit, pinterest, tiktok]
                  example: "facebook"
                category:
                  type: string
                  minLength: 5
                  example: "Technology"
                category_id:
                  type: string
                  minLength: 4
                  maxLength: 4
                  example: "1001"
                ad_id:
                  type: number
                  example: 123456
                sub_category:
                  type: string
                  minLength: 5
                  example: "Software"
                  description: Required if subcategory_id is provided
                subcategory_id:
