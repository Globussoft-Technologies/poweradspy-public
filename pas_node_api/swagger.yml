  /api/v1/linkedin/landers/insert_html_lander:
    post:
      tags: [LinkedIn Landers]
      summary: Persist scraped lander data across DB tables + ES
      description: >
        Accepts a JSON ARRAY of scraped lander objects. Validates the ad exists in
        `linkedin_ads_data`, then writes linkedin_ad_domains / linkedin_ad_outgoing_links /
        linkedin_ad_url / linkedin_ad_html_lander_content / linkedin_ad_lander / linkedin_ad_meta_data,
        updates `linkedin_ad.domain_id`, and patches the ES doc. `status` 3 = no-response (only bumps
        redirect_status). crawled_by `.net` → {1 done, 3 no-resp}; `python` → {4 done, 6 no-resp}.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [ad_id, country_iso, destinations, html_path, screen_shot, html_content, status, domain_registered_date, crawled_by]
                properties:
                  ad_id: { type: string, example: "233063" }
                  country_iso: { type: array, items: { type: string }, example: ["US"] }
                  destinations: { type: string, example: https://example.com/landing }
                  html_path: { type: string, example: /pas-dev/stream/linkedin/whiteHatAd/202506/233063.jpg }
                  screen_shot: { type: string }
                  html_content: { type: string }
                  status: { type: integer, enum: [1, 2, 3], example: 2 }
                  domain_registered_date: { type: string, nullable: true, example: '2022-01-15' }
                  crawled_by: { type: string, enum: ['.net', python], example: python }
                  domain_age: { type: integer, example: 1 }
                  redirects: { type: array, items: { type: string } }
                  ad_category: { type: array, items: { type: string } }
                  outgoing_url:
                    type: array
                    items:
                      type: object
                      properties:
                        start_url: { type: string }
                        redirect_urls: { type: array, items: { type: string } }
                        destination_url: { type: string }
      responses:
        '200':
          description: Lander stored / status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Destination Lander updated successfully }
                  exe_time: { type: number, example: 1.23 }
        '400':
          description: Ad not found, validation failed, or not updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 400 }
                  message: { type: string, example: ad not found }

