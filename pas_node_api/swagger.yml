  /api/v1/instagram/ads/getAdvertiserInsightsByDateRange:
    post:
      tags: [Instagram]
      summary: Get advertiser insights (LCS / country) for a custom date range
      description: |
        Fetches monthly LCS or country targeting for an advertiser over a specified date range.
        The advertiser is identified by `post_owner_id`.

        **type values:**
        - `lcs` — monthly likes/comments/shares breakdown + available_years
        - `country` — per-country ad count with ISO codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [post_owner_id, from_date, to_date, type]
              properties:
                post_owner_id:
                  type: integer
                  description: ID from instagram_ad_post_owners table
                  example: 42
                from_date:
                  type: string
                  format: date
                  description: Start date (YYYY-MM-DD)
                  example: '2023-01-01'
                to_date:
                  type: string
                  format: date
                  description: End date (YYYY-MM-DD)
                  example: '2023-12-31'
                type:
                  type: string
                  enum: [lcs, country]
                  description: Type of insight to fetch
                  example: lcs
      responses:
        '200':
          description: Data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  from_date:
                    type: string
                    example: '2023-01-01'
                  to_date:
                    type: string
                    example: '2023-12-31'
                  post_owner_id:
                    type: integer
                    example: 42
                  data:
                    oneOf:
                      - type: object
                        description: Monthly LCS data (for type=lcs)
                      - type: array
                        description: Country distribution (for type=country)
                        items:
                          type: object
        '400':
          description: Invalid parameters or no data found
        '401':
          description: Unauthorized
        '503':
          description: Search service unavailable

