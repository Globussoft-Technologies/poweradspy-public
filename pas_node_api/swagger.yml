  # ═══════════════════════════════════════════
  # QUORA
  # ═══════════════════════════════════════════

  /api/v1/quora/insertion/quoraAdsData:
    post:
      tags: [Quora Insertion]
      summary: Insert or update a Quora ad
      description: |
        Accepts a Quora ad object, array, or `{ "ads": [...] }` format.

        **INSERT flow:**
        1. Parallel pre-tx DB lookups (postOwner, domain, country, language)
        2. Single ACID transaction inserts across all tables
        3. Post-owner image uploaded after commit to NAS
        4. Elasticsearch document indexed

        **UPDATE flow:** Updates last_seen, days_running, and related metadata.

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                post_owner:           { type: string }
                network:              { type: string, example: "Quora" }
                post_owner_image:     { type: string, nullable: true }
                ad_title:             { type: string, nullable: true }
                ad_text:              { type: string, nullable: true }
                ad_image:             { type: string, nullable: true }
                platform:             { type: integer, example: 12, description: "12 bypasses x-signature auth" }
                destination_url:      { type: string, nullable: true }
                ad_id:                { type: string }
                country:              { type: string }
                ad_position:          { type: string, nullable: true }
                version:              { type: string }
                ip_address:           { type: string, nullable: true }
                source:               { type: string, nullable: true }
                post_date:            { type: string, nullable: true, description: "YYYY-MM-DD HH:MM:SS or epoch seconds" }
            examples:
              basic_ad:
                summary: Basic Quora ad
                value:
                  post_owner: "Test Advertiser"
                  network: Quora
                  platform: 12
                  ad_id: "quora_test_001"
                  ad_title: "Test Ad"
                  ad_text: "Test content"
                  destination_url: "https://example.com"
                  country: "United States"
                  version: "1.0.0"
      responses:
        '200':
          description: Ad inserted or updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsertionResponse' }
              examples:
                inserted: { summary: New ad inserted, value: { code: 200, status: ok, message: "Ad inserted successfully", data: { id: 5001 } } }
                updated:  { summary: Existing ad updated, value: { code: 200, status: ok, message: "Ad already present — existing data updated (id 5001)", data: { id: 5001 } } }
        '400':
          description: Validation error (missing required fields, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized — missing x-signature and platform bypass not set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for Quora network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/quora/insertion/delete:
    post:
      tags: [Quora Insertion]
      summary: Delete a Quora ad (cascade SQL + Elasticsearch)
      description: |
        Deletes a Quora ad and all child rows from MySQL in one transaction,
        then removes the document from `quora_search_mix`.

        Pass `id` (internal `quora_ad.id`) **or** `ad_id` (platform id).

        **Auth:** `x-delete-token` header or `body.token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:    { type: integer, description: "Internal quora_ad.id" }
                ad_id: { type: string, description: "Platform ad_id" }
                token: { type: string, description: "Delete token (alternative to x-delete-token header)" }
            examples:
              by_ad_id:      { summary: By platform ad_id, value: { ad_id: "quora_test_001" } }
              by_internal_id: { summary: By internal id, value: { id: 5001 } }
      responses:
        '200':
          description: Ad deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:    { type: integer, example: 200 }
                  status:  { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully!" }
                  data:    { type: object, properties: { id: { type: integer, example: 5001 } } }
        '400':
          description: Ad not found or missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/reddit/insertion/redAdsData:
    post:
      tags: [Reddit Insertion]
      summary: Insert or update a Reddit ad
      description: |
        Accepts a Reddit ad object, array, or `{ "ads": [...] }` format.

        **INSERT flow:**
        1. Parallel pre-tx DB lookups (user, existing ad check)
        2. Single ACID transaction inserts across all tables
        3. Image/thumbnail uploaded to NAS within transaction
        4. Post-owner image uploaded after commit to NAS
        5. Elasticsearch document indexed

        **UPDATE flow:** Updates type, platform, last_seen, ad_position, and related metadata.

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ad_id:                        { type: string, description: "Platform ad_id (required)" }
                reddit_id:                    { type: string, description: "Reddit username (required)" }
                platform:                     { type: integer, example: 15, description: "12 bypasses x-signature auth" }
                type:                         { type: string, enum: [IMAGE, VIDEO, TEXT], description: "Ad type (required)" }
                ad_position:                  { type: string, example: "FEED", description: "Position (required)" }
                version:                      { type: string, example: "1.0.0", description: "Version (required)" }
                source:                       { type: string, enum: [desktop, android, ios], description: "Source (required)" }
                country:                      { type: string, example: "United States", description: "Country (required)" }
                city:                         { type: string, nullable: true }
                state:                        { type: string, nullable: true }
                lower_age:                    { type: integer, nullable: true }
                upper_age:                    { type: integer, nullable: true }
                ip_address:                   { type: string, nullable: true, description: "IPv4/IPv6" }
                ad_title:                     { type: string, nullable: true }
                ad_text:                      { type: string, nullable: true }
                ad_url:                       { type: string, nullable: true, description: "Reddit post URL" }
                destination_url:              { type: string, nullable: true }
                thumbnail_url:                { type: string, nullable: true, description: "For VIDEO type" }
                image_url:                    { type: string, nullable: true, description: "For IMAGE type" }
                image_video_url:              { type: string, nullable: true, description: "For IMAGE/VIDEO type" }
                image_video_url_original:     { type: string, nullable: true }
                post_owner:                   { type: string, nullable: true }
                post_owner_image:             { type: string, nullable: true }
                post_date:                    { type: string, nullable: true, description: "YYYY-MM-DD HH:MM:SS or epoch seconds" }
                likes:                        { type: string, nullable: true }
                comment:                      { type: string, nullable: true }
                share:                        { type: string, nullable: true }
                call_to_action:               { type: string, nullable: true }
                category:                     { type: string, nullable: true }
                news_feed_description:        { type: string, nullable: true }
            examples:
              video_ad:
                summary: VIDEO ad example
                value:
                  ad_id: "t2_12pd8j"
                  reddit_id: "deep_sea_davVd_Z"
                  platform: 12
                  type: "VIDEO"
                  ad_position: "FEED"
                  version: "1.0.1"
                  source: "ios"
                  country: "United States"
                  city: "Ashburn"
                  state: "Virginia"
                  ad_title: "College students get 50% off Target Circle 360"
                  ad_url: "https://www.reddit.com/r/reddit/comments/..."
                  destination_url: "https://target.com"
                  image_video_url: "https://v.redd.it/4pyfhl66us7f1/DASH_360.mp4"
                  post_owner: "Target_Official"
      responses:
        '200':
          description: Ad inserted or updated successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsertionResponse' }
              examples:
                inserted: { summary: New ad inserted, value: { code: 200, status: ok, message: "Ad inserted successfully", data: { id: 8001 } } }
                updated:  { summary: Existing ad updated, value: { code: 200, status: ok, message: "Ad already present — existing data updated (id 8001)", data: { id: 8001 } } }
        '400':
          description: Validation error (missing required fields, invalid type, etc.)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized — missing x-signature and platform bypass not set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for Reddit network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/reddit/insertion/delete:
    post:
      tags: [Reddit Insertion]
      summary: Delete a Reddit ad (cascade SQL + Elasticsearch)
      description: |
