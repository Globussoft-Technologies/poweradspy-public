  # ═══════════════════════════════════════════
  # SDUI
  # ═══════════════════════════════════════════

  /api/sdui/config:
    get:
      tags: [SDUI]
      summary: Get SDUI configuration
      description: |
        Returns the full SDUI config grouped by `config_type` (searchbar, navbar, sidebar).

        **Platform filtering** — pass `?platforms=facebook,instagram` to get only the filters
        and options applicable to those networks.

        Filtering rules:
        - **Filter level**: filter is included only if its `platform_applicability` overlaps with requested platforms
        - **Option level**: option is included only if its `platform_applicability` overlaps with requested platforms (absent = common, shown for all)
        - **Sidebar docs**: filtered via `platform_filter_matrix` in the navbar `platforms` document

        If `?platforms` is omitted → full unfiltered config is returned (used by admin).
      parameters:
        - name: platforms
          in: query
          required: false
          schema:
            type: string
            example: facebook,instagram
          description: |
            Comma-separated list of network names to filter config by.
            Valid values: `facebook`, `instagram`, `youtube`, `google`, `gdn`, `native`, `linkedin`, `reddit`, `quora`, `pinterest`
            Multiple values: `?platforms=facebook,instagram`
            If omitted → full unfiltered config (used by admin).
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from previous response for conditional GET
      responses:
        "200":
          description: Full SDUI config
          headers:
            ETag:
              schema:
                type: string
              description: Hash of the config for conditional requests
            Cache-Control:
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
        "304":
          description: Not modified — client cache is still valid

  /api/v1/sdui/config/version:
    get:
      tags: [SDUI]
      summary: Get SDUI config version hash
      description: Lightweight endpoint — returns only the version hash of the current SDUI config. Use this to poll for changes without fetching the full config.
      responses:
        "200":
          description: Current config version
          content:
            application/json:
              schema:
                type: object
                properties:
                  config_version:
                    type: string
                    example: "a3f2c1d9e8b7"

  # SDUI Admin CRUD (requires admin auth)
  # ═══════════════════════════════════════════

  /admin/api/sdui/docs:
    get:
      tags: [SDUI Admin]
      summary: List all SDUI documents
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: All SDUI config documents
    post:
      tags: [SDUI Admin]
      summary: Create a new SDUI document
      description: >
        Creates a new SDUI config document. **Rank auto-shifting**: if a document
        with the same `config_type` already has `rank >=` the new document's rank,
        all such documents are automatically incremented by 1 before insertion.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_id, config_type, title]
              properties:
                _id:
                  type: string
                  example: "my_new_filter"
                config_type:
                  type: string
                  enum: [searchbar, navbar, sidebar]
                  example: "navbar"
                title:
                  type: string
                  example: "MY NEW FILTER"
                rank:
                  type: integer
                  example: 5
                visible:
                  type: boolean
                  example: true
                flag:
                  type: boolean
                  example: true
                display_mode:
                  type: string
                  example: "dropdown"
                meta:
                  type: string
                  example: "Description of this filter section"
                filters:
                  type: array
                  items:
                    type: object
      responses:
        "201":
          description: Document created
        "409":
          description: Document with this _id already exists

  /admin/api/sdui/docs/{id}:
    get:
      tags: [SDUI Admin]
      summary: Get a single SDUI document
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SDUI document
        "404":
          description: Document not found
    put:
      tags: [SDUI Admin]
      summary: Replace full SDUI document (upsert)
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Document updated
    delete:
      tags: [SDUI Admin]
      summary: Delete SDUI document
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted

  /admin/api/sdui/docs/{id}/flag:
    patch:
      tags: [SDUI Admin]
      summary: Toggle document active/inactive
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
