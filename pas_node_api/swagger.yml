  # ═══════════════════════════════════════════
  # YOUTUBE
  # ═══════════════════════════════════════════

  /api/v1/youtube/ads/search:
    post:
      tags: [YouTube]
      summary: Search YouTube ads
      description: |
        Searches the YouTube ad Elasticsearch index (`youtube_ads_data`).

        **Key differences from Facebook/Instagram search:**
        - Engagement filters use `views` and `dislikes` (no `shares`, `impressions`, `popularity`)
        - Sort fields: `views_sort`, `dislikes_sort` are YouTube-only; `shares_sort` / `impression_sort` not available
        - Image analysis: uses `image_object`, `image_celebrity`, `image_logo` (from `youtube_ad_ocb` table)
        - Country field is stored flat as `countries` in ES (not nested)

        **Two-phase fetch:** ES → get IDs → SQL JOIN to enrich with full ad details.

        **Special modes** (short-circuit ES, query SQL directly):
        - `favorite=true` → returns user's favorited ads (`youtube_hidden_ads` type=3)
        - `hidden=true` → returns user's hidden ads (`youtube_hidden_ads` type=1,2)
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YouTubeSearchRequest'
            examples:
              basic_keyword:
                summary: Basic keyword search
                value:
                  keyword: fitness
                  take: 20
                  skip: 0
                  newest_sort: desc
                  user_id: 281
              views_filter:
                summary: High-view ads
                value:
                  views: [100000, 10000000]
                  views_sort: desc
                  country: ["US"]
                  take: 20
                  skip: 0
                  user_id: 281
              favorites:
                summary: Get favorited ads
                value:
                  favorite: "true"
                  user_id: 281
                  take: 20
                  skip: 0
      responses:
        '200':
          description: YouTube ad search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              example:
                code: 200
                message: Ads fetched successfully
                data:
                  - id: 99001
                    ad_id: 99001
                    ad_title: Best Fitness App 2024
                    ad_text: Transform your body in 30 days
                    post_owner: FitLife Channel
                    likes: 4200
                    dislikes: 38
                    comments: 312
                    view: 95000
                    image_video_url: /PowerAdspy/yt/thumb_99001.jpg
                    post_date: "2024-03-15"
                    last_seen: "2024-06-10"
                    call_to_action: VISIT_SITE
                    network: youtube
                meta:
                  total:
                    youtube: 4301
                  networksWithData: [youtube]
                  suggestedNetworks: []
                  ipcountry: US
                  ipCountryActive: true
        '400':
          description: Missing user_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Elasticsearch or SQL connection unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

