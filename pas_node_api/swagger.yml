    post:
      tags: [Google Landers]
      summary: Upload a lander screenshot and/or HTML zip to NAS
      description: status 1 → BLACKHAT, 2 → WHITEHAT. Returns the stored NAS paths.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                ad_id: { type: string }
