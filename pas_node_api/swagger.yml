                $ref: '#/components/schemas/InsertionResponse'
        '400':
          description: Validation / business-rule failure (e.g. missing ad_id, missing linkedin_id for platform 10/12, bad version)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized signature / platform, or linkedin_id not found in linkedin_users
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error while saving (DB / Elasticsearch / NAS image)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/linkedin/insertion/delete:
    post:
      tags: [LinkedIn Insertion]
      summary: Securely delete a LinkedIn ad (SQL + Elasticsearch)
      description: |
        Deletes an ad and ALL its child rows from SQL (one transaction, FK-aware cascade) and
        removes the doc from Elasticsearch `linkedin_ads_data`. Port of UserController@deleteads.

        Identify the ad by `id` (internal linkedin_ad.id) or `ad_id` (platform id). NOTE: the
        ES `_id` equals the internal `linkedin_ad.id`, so the ES doc is deleted by that id directly.

        **Auth:** token via the `x-delete-token` header (preferred) or body `token`.
      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id: { type: integer, description: Internal linkedin_ad.id, example: 44289 }
                ad_id: { type: string, description: Platform ad_id (numeric; used if id is absent), example: "1330630016" }
                token: { type: string, description: Delete token (alternative to x-delete-token header) }
            examples:
              byInternalId:
                summary: Delete by internal id
                value: { id: 44289 }
              byAdId:
                summary: Delete by platform ad_id
                value: { ad_id: "1330630016" }
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  status: { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully !" }
                  data: { type: object, properties: { id: { type: integer, example: 44289 } } }
        '400':
          description: Missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Ad not present in database, or insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

