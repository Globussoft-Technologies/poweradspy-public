      tags: [Google Landers]
      summary: Persist scraped lander data + patch ES
      description: 'Body: { ad_id, insertData }. The ad must exist in google_ads_data.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id, insertData]
              properties:
                ad_id: { type: string }
                insertData: { type: object }
      responses:
        '200': { description: Lander stored }
        '400': { description: Ad not found / validation failed }

