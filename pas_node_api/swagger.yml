  # NATIVE OCR / OCB (image-processing pipeline)
  # ═══════════════════════════════════════════

  /api/v1/native/ocr/getNativeImageUrl:
    get:
      tags: [Native OCR]
      summary: Lease a batch of Native image ads queued for OCB/OCR
      description: >-
        Hands out up to 20 IMAGE ads (newest first), resolves each image_url to an absolute NAS URL,
        and flips the batch to image_url_status=2 (in-progress) so the next call does not return the
        same ads. status=0 → OCB queue; status=4 → OCR queue (also returns image_ocr). No auth.
        HTTP is always 200 — the real outcome is the body `code`.
      parameters:
        - in: query
          name: status
          required: true
          schema: { type: integer, enum: [0, 4], example: 0 }
          description: 0 = OCB queue, 4 = OCR queue
      responses:
        '200':
          description: Outcome in body code (200 leased, 400 empty/validation, 401 error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Url fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ad_id: { type: integer, example: 265633 }
                        image_url: { type: string, example: "https://media.globussoft.com/pas-dev/stream/native/adImage/202606/265633.jpg" }
                        image_ocr: { type: string, nullable: true, description: Only present when status=4 }
                  exe_time: { type: number, example: 0.01 }

  /api/v1/native/ocr/update-image-info:
    post:
      tags: [Native OCR]
      summary: Persist OCB/OCR results back to MySQL + Elasticsearch
      description: >-
        Writes scraper output to native_ad_variants (keyed by native_ad_id) and mirrors it into
        native_search_mix. status=1 (OCB done) stamps object_update_date; status=4 (OCR done) writes the
        image_ocr family and stamps ocr_updated_date; status=2 re-queues (image_url_status → 3 if any
        column is null, else 1). ⚠ Overwrite, not append — object/celebrity/brand_logo are replaced every
        call (omitting one sets it to NULL); ocr is kept if omitted. SQL and ES writes are independent.
        No auth; HTTP always 200 (outcome in body `code`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id]
              properties:
                ad_id: { type: integer, example: 265633, description: internal native_ad.id }
                status: { type: integer, enum: [1, 2, 4], example: 4, description: 1=OCB done, 4=OCR done, 2=re-queue/partial }
                object: { type: string, nullable: true, example: "shoe||bottle", description: "||-delimited; overwrite" }
                celebrity: { type: string, nullable: true, example: "", description: "||-delimited; overwrite" }
                brand_logo: { type: string, nullable: true, example: "Nike", description: "||-delimited; overwrite" }
                ocr: { type: string, nullable: true, example: "Limited offer||Buy now", description: "||-delimited; kept if omitted" }
      responses:
        '200':
          description: Outcome in body code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Data Updated Successfully }
              examples:
                updated: { summary: Success, value: { code: 200, message: Image Data Updated Successfully } }
                invalidAd: { summary: No variant row, value: { code: 400, message: Please enter valid ad_id } }
                notInEs: { summary: Not in Elasticsearch, value: { code: 400, message: ad not found } }

