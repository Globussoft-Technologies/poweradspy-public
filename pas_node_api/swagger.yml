                  destination_url: https://acme-shop.com/sale
                  ad_id: GDN_TEST_0001
                  city: Bengaluru
                  state: Karnataka
                  country: India
                  ad_position: SIDE
                  ad_sub_position: TOP
                  ad_number_position: "1"
                  ad_text: Shop now and save big
                  version: "1.0.0"
                  ip_address: 106.51.38.160
                  source: desktop
                  target_site: https://www.ndtv.com
                  placement_url: https://www.ndtv.com/
                  system_id: ext-cimxp6hb
      responses:
        '200':
          description: Ad inserted/updated, or batch summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsertionResponse'
        '400':
          description: Validation / business-rule failure (e.g. missing ad_id, bad version)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Unauthorized signature / platform
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '403':
          description: Insertion disabled for this network
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500':
          description: Server error while saving (DB / Elasticsearch / NAS image)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /api/v1/gdn/insertion/delete:
    post:
      tags: [GDN Insertion]
      summary: Securely delete a GDN ad (SQL + Elasticsearch)
      description: |
        Deletes an ad and ALL its child rows from SQL (in one transaction) and removes
        the document from Elasticsearch `gdn_search_mix`. Port of UserController@deleteads.

        Identify the ad by `id` (internal gdn_ad.id) or `ad_id` (platform id).

