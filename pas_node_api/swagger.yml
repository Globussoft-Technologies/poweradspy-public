        "200":
          description: Visibility updated

  /admin/api/sdui/docs/{id}/filters:
    post:
      tags: [SDUI Admin]
      summary: Add a filter to a document
      description: >
        Adds a filter to the document's filters array. **Rank auto-shifting**: if
        any existing filter in this document has `rank >=` the new filter's rank,
        those filters are automatically incremented by 1 before insertion.
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [_id, label, type, query_param]
              properties:
                _id:
                  type: string
                  example: "my_filter"
                label:
                  type: string
                  example: "My Filter"
                type:
                  type: string
                  enum: [multiselect, radio, range_slider, autocomplete, date_preset, date_range_custom, icon_toggle, nested_multiselect]
                  example: "multiselect"
                rank:
                  type: integer
                  example: 1
                query_param:
                  type: string
                  example: "myFilter"
                visible:
                  type: boolean
                  example: true
                multi_select:
                  type: boolean
                  example: true
                platform_applicability:
                  example: "all"
                options:
                  type: array
                  items:
                    type: object
      responses:
        "201":
          description: Filter added

  /admin/api/sdui/docs/{id}/filters/{filterId}:
    put:
      tags: [SDUI Admin]
      summary: Update a filter in a document
      security: [{ BearerAuth: [] }]
      parameters:
