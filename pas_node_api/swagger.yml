  /api/v1/gdn/insertion/gdnAdsData:
    post:
      tags: [GDN Insertion]
      summary: Insert / update a GDN ad (gdnAdsData)
      description: |
        Ingests a scraped GDN (Google Display Network) ad. If the `ad_id` is new it is
        INSERTED (across the gdn_* tables + Elasticsearch `gdn_search_mix`); if it already
        exists its data is UPDATED (last_seen, days_running, and target_site / placement_url
        / country / state / city merged). Each request is processed synchronously and returns
        the real per-ad result in milliseconds.

