  /api/v1/facebook/ads/getAdvertiserInsightsByDateRange:
    post:
      tags: [Facebook]
      summary: Get advertiser insights (LCS / country / user) for a custom date range
      description: |
        Fetches monthly LCS, country targeting, or user demographics for an advertiser
        over a specified date range. The advertiser is identified by `post_owner_id`
        (more efficient than `facebook_ad_id` — no extra join needed).

        **type values:**
        - `lcs` — monthly likes/comments/shares/engagement_rate breakdown + available_years
        - `country` — per-country ad count with ISO codes
        - `user` — age, gender, relationship demographics

        `user_id` is injected automatically from the JWT token by `authMiddleware`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [post_owner_id, from_date, to_date, type]
              properties:
                post_owner_id:
                  type: integer
                  description: ID from facebook_ad_post_owners table
                  example: 42
                from_date:
                  type: string
                  format: date
                  description: Start date (YYYY-MM-DD)
                  example: '2023-01-01'
                to_date:
                  type: string
                  format: date
                  description: End date (YYYY-MM-DD)
                  example: '2023-12-31'
                type:
                  type: string
                  enum: [lcs, country, user]
                  description: Type of insight to fetch
                  example: lcs
      responses:
        '200':
          description: Data fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  from_date:
                    type: string
                    example: '2023-01-01'
                  to_date:
                    type: string
                    example: '2023-12-31'
                  available_years:
                    type: array
                    description: Present when type=lcs
                    items:
                      type: integer
                    example: [2022, 2023]
                  data:
                    type: object
                    description: |
                      Shape varies by type:
                      - lcs: { jan_2023: { total_ads, likes, comments, shares, engagement_rate, ad_ids[] }, ... }
                      - country: [{ country, iso, ad_count, ad_ids[] }, ...]
                      - user: { ageData, genderData, relationshipData }
        '400':
          description: Missing/invalid params or no data found
        '401':
          description: Unauthorized (missing or invalid JWT)
        '503':
          description: Elasticsearch not available

