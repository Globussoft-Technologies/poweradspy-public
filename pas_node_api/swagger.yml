      security:
        - DeleteTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:    { type: integer, description: "Internal reddit_ad.id" }
                ad_id: { type: string, description: "Platform ad_id" }
                token: { type: string, description: "Delete token (alternative to x-delete-token header)" }
            examples:
              by_internal_id: { summary: By internal id, value: { id: 8001 } }
              by_ad_id:      { summary: By platform ad_id, value: { ad_id: "t2_12pd8j" } }
      responses:
        '200':
          description: Ad deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:    { type: integer, example: 200 }
                  status:  { type: string, example: ok }
                  message: { type: string, example: "Data is deleted successfully!" }
                  data:    { type: object, properties: { id: { type: integer, example: 8001 } } }
        '400':
          description: Ad not found or missing id/ad_id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          description: Invalid or missing delete token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

