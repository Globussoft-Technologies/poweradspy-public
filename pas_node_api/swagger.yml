                type:
                  type: integer
                  enum: [1, 2, 3]
                  example: 3
                ad_id:
                  type: integer
                  description: Required for type 2 and 3
                  example: 130256
                post_owner_id:
                  type: integer
                  description: Required for type 1
      responses:
        '200':
          description: Successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: data deleted successfully
                  data:
                    type: integer
                    example: 1
        '400':
          description: Data not deleted or invalid params

