      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Clears the `authToken` cookie. No request body needed.
      security: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Logged out successfully

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Returns the decoded JWT payload for the authenticated user.
      responses:
        '200':
          description: Current user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    $ref: '#/components/schemas/UserPayload'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      description: Issues a fresh JWT (and updates the cookie) while the current token is still valid.
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      expiresIn:
                        type: string
        '401':
          description: Token expired or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ═══════════════════════════════════════════
  # FACEBOOK
  # ═══════════════════════════════════════════

  /api/v1/facebook/ads/search:
    post:
      tags: [Facebook]
      summary: Search Facebook ads
      description: |
        Search Facebook ads with 30+ filters. All fields are optional.
        Results are paginated using `take` (page size) and `skip` (page number, 0-indexed).
        Only one sort field should be sent per request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacebookSearchRequest'
            examples:
              keywordSearch:
                summary: Basic keyword search
                value:
                  keyword: shoes
                  take: 20
                  skip: 0
                  newest_sort: desc
              videoAds:
                summary: Video ads in US sorted by likes
                value:
                  type: ["VIDEO"]
                  country: ["US"]
                  take: 20
                  skip: 0
                  likes_sort: desc
              dateRange:
                summary: Ads seen in last 30 days
                value:
                  take: 20
                  skip: 0
                  lastSeen:
                    lower_date: "2024-11-01"
                    upper_date: "2024-12-01"
