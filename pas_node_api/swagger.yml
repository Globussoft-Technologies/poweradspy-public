          name: size
          schema:
            type: integer
            default: 10
        - in: query
          name: search_after
          schema:
            type: string
          description: JSON-encoded cursor from previous response
        - in: query
          name: from_date
          schema:
            type: string
            example: "2026-05-01 00:00:00"
        - in: query
          name: to_date
          schema:
            type: string
            example: "2026-05-31 23:59:59"
      responses:
        '200':
          description: All search data retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Data retrieved successfully
                  user_id:
                    type: integer
                    example: 281
                  totalCount:
                    type: integer
                    example: 500
                  search_after:
                    type: string
                    example: "[1716912000, \"xyz123\"]"
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        network:
                          type: string
                          example: facebook
                        date:
                          type: string
                          example: "2026-05-30 14:22:00"
                        adsCountOnSerach:
                          type: string
                          example: "20"
                        adsCount:
                          type: string
                          example: "20"
        '404':
          description: No activity found for the user
        '401':
          description: Unauthorized — missing or invalid JWT token

  /api/v1/admin_user_activity/get-pending-users:
    get:
      tags:
        - Admin User Activity
      summary: Get paginated list of pending users
      description: |
        Returns a paginated list of aMember users with status=0 (pending).
        Optionally filter by a specific `user_id`.
        Requires a valid JWT token (Bearer or `authToken` cookie).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number (1-based)
        - in: query
          name: size
          schema:
            type: integer
            default: 20
          description: Number of records per page
        - in: query
          name: user_id
          schema:
            type: integer
          description: Filter by a specific aMember user ID (skips pagination)
      responses:
        '200':
          description: Pending users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: User details fetched successfully
                  totalCount:
                    type: integer
                    description: Total number of pending users in aMember
                    example: 45
                  page:
                    type: integer
                    example: 1
                  size:
                    type: integer
                    example: 20
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id:
                          type: integer
                          example: 410
                        name:
                          type: string
                          example: Alice Brown
                        email:
                          type: string
                          example: alice@example.com
        '400':
          description: No data found or error fetching from aMember
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 400
                  message:
                    type: string
                    example: There is no data
        '401':
          description: Unauthorized — missing or invalid JWT token
        '503':
          description: aMember API not configured

  /api/v1/admin_user_activity/intelligence/stats:
    get:
      tags:
        - Admin User Activity
      summary: Get search intelligence summary stats
      description: |
        Returns aggregated stats for a given time window:
        total searches, active users, unique keywords, high-volume flags,
        and delta % comparison with the previous equal-length window.
        If from_date/to_date are omitted the window is auto-derived from
        the latest document dateTime (last 7 days).
        Requires a valid JWT token (Bearer or authToken cookie).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: from_date
          schema:
            type: string
            format: date
            example: "2026-05-01"
          description: Start date (inclusive). Defaults to 7 days before to_date.
        - in: query
          name: to_date
          schema:
            type: string
            format: date
            example: "2026-06-10"
          description: End date (inclusive). Defaults to latest document date.
      responses:
        '200':
          description: Stats fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      total_searches:
                        type: integer
                        example: 14320
                      active_users:
                        type: integer
                        example: 312
                      unique_keywords:
                        type: integer
                        example: 4891
                      high_volume_flags:
                        type: integer
                        example: 7
                      delta:
                        type: object
                        properties:
                          total_searches:
                            type: number
                            example: 12.4
                          active_users:
                            type: number
                            example: -3.1
                          unique_keywords:
                            type: number
                            example: 8.0
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /api/v1/admin_user_activity/intelligence/top-users:
    get:
      tags:
        - Admin User Activity
      summary: Get top users by search count
      description: |
        Returns users ranked by number of searches in the given time window,
        with per-user filter breakdowns (countries, languages, CTAs, etc.).
        Requires a valid JWT token (Bearer or authToken cookie).
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: from_date
          schema:
            type: string
            format: date
            example: "2026-05-01"
        - in: query
          name: to_date
          schema:
            type: string
            format: date
            example: "2026-06-10"
        - in: query
          name: size
          schema:
            type: integer
            default: 20
          description: Max number of users to return
        - in: query
          name: flagged_only
          schema:
            type: boolean
            default: false
          description: If true, return only high-volume flagged users
      responses:
        '200':
          description: Top users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: string
                              example: "72688"
                            email:
                              type: string
                              example: "user@example.com"
                            search_count:
                              type: integer
                              example: 843
                            flagged:
                              type: boolean
                              example: false
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

