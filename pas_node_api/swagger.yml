  /api/v1/linkedin/insertion/lnAdsData:
    post:
      tags: [LinkedIn Insertion]
      summary: Insert / update a LinkedIn ad (lnAdsData)
      description: |
        Ingests a scraped LinkedIn ad. If the `ad_id` is new it is INSERTED (across the
        linkedin_* tables + Elasticsearch `linkedin_ads_data`); if it already exists its data is
        UPDATED (last_seen, days_running, likes/comments, analytics, country/user counts). Each
        request is processed synchronously and returns the real per-ad result in milliseconds.

        Accepts a **single ad object**, a bare **array of ads**, or `{ "ads": [ ... ] }`.
        For an array, each ad is processed independently (one failure does not abort the rest).

        **One endpoint for BOTH flows — distinguished by `platform`:**
          - `platform: 10` → **normal LinkedIn** (requires a valid `linkedin_id`).
          - `platform: 15` → **ads library** (no `linkedin_id`; `country` may be comma-separated →
            one row per country; `impression` = `(impression_low + impression_high) / 2`, and
            `impression_low` / `impression_high` / `impression_country` are stored).
          - `platform: 12` → bypass platform for local testing (also requires `linkedin_id`).

        **LinkedIn specifics:** `ad_id` is numeric (bigint UNIQUE); the ad image is downloaded and
        stored on NAS named by the internal `linkedin_ad.id`; the ES doc is FLAT (no `linkedin_ad.`
        prefix) and its date fields (first_seen / last_seen / post_date) are UNIX **epoch integers**;
        the ES `_id` IS the internal `linkedin_ad.id`. Image is uploaded on INSERT only (not UPDATE).

        **Auth:** `x-signature` HMAC of the raw body, OR `platform == "12"` bypass.
      security:
        - SignatureAuth: []
      requestBody:
        required: true
        content:
