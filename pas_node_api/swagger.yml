  # ═══════════════════════════════════════════
  # FACEBOOK OCR / OCB (image-processing pipeline)
  # ═══════════════════════════════════════════

  /api/v1/facebook/ocr/getFBImageUrl:
    get:
      tags: [Facebook OCR]
      summary: Lease a batch of Facebook image ads queued for OCB/OCR
      description: >-
        Hands out up to 20 IMAGE ads (seen in the last 10 days, newest first), resolves each
        image_url to an absolute NAS URL, and flips the batch to image_url_status=2 (in-progress)
        so the next call does not return the same ads. status=0 → OCB queue (object/celebrity/brand);
        status=4 → OCR queue (text), which also returns the existing image_ocr. The legacy `field`
        param is accepted but ignored (status drives the queue). No auth. HTTP is always 200 — the
        real outcome is the body `code`.
      parameters:
        - in: query
          name: status
          required: true
          schema: { type: integer, enum: [0, 4], example: 0 }
          description: 0 = OCB queue, 4 = OCR queue
        - in: query
          name: field
          required: false
          schema: { type: string, example: object }
          description: Legacy param — accepted but not used.
      responses:
        '200':
          description: Outcome in body code (200 leased, 400 empty/validation, 401 error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Url fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ad_id: { type: integer, example: 130931 }
                        image_url: { type: string, example: "https://media.globussoft.com/pas-dev/stream/fb/adImage/202606/101886.jpg" }
                        image_ocr: { type: string, nullable: true, description: Only present when status=4 }
                  exe_time: { type: number, example: 0.01 }

  /api/v1/facebook/ocr/update-image-info:
    post:
      tags: [Facebook OCR]
      summary: Persist OCB/OCR results back to MySQL + Elasticsearch
      description: >-
        Writes scraper output to facebook_ad_variants (keyed by facebook_ad_id) and mirrors it into
        search_mix. status=1 (OCB done) writes object/celebrity/brand (+ _ru/_fr/_sp/_exactly) and
        stamps object_update_date; status=4 (OCR done) additionally writes the image_ocr family and
        stamps ocr_updated_date; status=2 re-queues (image_url_status → 3 if any column is null, else 1).
        ⚠ Overwrite, not append — object/celebrity/brand_logo are replaced every call (omitting one sets
        it to NULL); ocr is the exception (kept if omitted). SQL and ES writes are independent. No auth;
        HTTP always 200 (outcome in body `code`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id]
              properties:
                ad_id: { type: integer, example: 130955, description: internal facebook_ad.id }
                status: { type: integer, enum: [1, 2, 4], example: 4, description: 1=OCB done, 4=OCR done, 2=re-queue/partial }
                object: { type: string, nullable: true, example: "shoe||bottle", description: "||-delimited; overwrite" }
                celebrity: { type: string, nullable: true, example: "", description: "||-delimited; overwrite" }
                brand_logo: { type: string, nullable: true, example: "Nike", description: "||-delimited; overwrite" }
                ocr: { type: string, nullable: true, example: "Limited offer||Buy now", description: "||-delimited; kept if omitted" }
      responses:
        '200':
          description: Outcome in body code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Data Updated Successfully }
              examples:
                updated: { summary: Success, value: { code: 200, message: Image Data Updated Successfully } }
                invalidAd: { summary: No variant row, value: { code: 400, message: Please enter valid ad_id } }
                notInEs: { summary: Not in Elasticsearch, value: { code: 400, message: ad not found } }

  # ═══════════════════════════════════════════
  # GDN OCR / OCB (image-processing pipeline)
  # ═══════════════════════════════════════════

  /api/v1/gdn/ocr/getGDNImageUrl:
    get:
      tags: [GDN OCR]
      summary: Lease a batch of GDN image ads queued for OCB/OCR
      description: >-
        Hands out up to 20 IMAGE ads (newest first; unlike Facebook there is no last_seen window),
        resolves each image_url to an absolute NAS URL, and flips the batch to image_url_status=2
        (in-progress). status=0 → OCB queue; status=4 → OCR queue (also returns image_ocr). The legacy
        `field` param is accepted but ignored. No auth. HTTP is always 200 — outcome is the body `code`.
      parameters:
        - in: query
          name: status
          required: true
          schema: { type: integer, enum: [0, 4], example: 0 }
          description: 0 = OCB queue, 4 = OCR queue
        - in: query
          name: field
          required: false
          schema: { type: string, example: object }
          description: Legacy param — accepted but not used.
      responses:
        '200':
          description: Outcome in body code (200 leased, 400 empty/validation, 401 error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Url fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ad_id: { type: integer, example: 379113 }
                        image_url: { type: string, example: "https://media.globussoft.com/pas-dev/stream/gdn/adImage/202606/379113.jpg" }
                        image_ocr: { type: string, nullable: true, description: Only present when status=4 }
                  exe_time: { type: number, example: 0.01 }

  /api/v1/gdn/ocr/insert-GDN-imageUrl-data:
    post:
      tags: [GDN OCR]
      summary: Persist OCB/OCR results to Elasticsearch (first) + MySQL
      description: >-
        Patches gdn_search_mix FIRST (matched by gdn_ad.id) with the OCB fields
        (+ _ru/_fr/_sp/_exactly), adding the image_ocr family only when status=4 — and ONLY if that ES
        update succeeds does it write gdn_ad_variants. ES values are normalized ||-joined STRINGS (any of
        `||,` / `||` / `|` collapse to `||`); MySQL keeps the RAW body values (kept if omitted).
        image_url_status becomes 1 when the pre-update row already had object+celebrity+brand+ocr all set,
        else `status` (1 or 4). object_update_date stamped on status=1, ocr_updated_date on status=4.
        No auth; HTTP always 200 (outcome in body `code`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id]
              properties:
                ad_id: { type: integer, example: 379113, description: internal gdn_ad.id }
                status: { type: integer, enum: [1, 4], example: 4, description: 1=OCB done, 4=OCR done }
                object: { type: string, nullable: true, example: "shoe||bottle", description: "delimited; normalized to || in ES" }
                celebrity: { type: string, nullable: true, example: "", description: "delimited; normalized to || in ES" }
                brand_logo: { type: string, nullable: true, example: "Nike", description: "delimited; normalized to || in ES" }
                ocr: { type: string, nullable: true, example: "Limited offer||Buy now", description: "delimited; kept if omitted" }
      responses:
        '200':
          description: Outcome in body code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Data Updated Successfully }
              examples:
                updated: { summary: Success, value: { code: 200, message: Image Data Updated Successfully } }
                noVariant: { summary: No variant row, value: { code: 400, message: gdn_ad_id not present in gdn_ad_variants table } }
                notInEs: { summary: Not in Elasticsearch, value: { code: 400, message: Ad not found } }

  # ═══════════════════════════════════════════
  # LINKEDIN OCR / OCB (image-processing pipeline)
  # ═══════════════════════════════════════════

  /api/v1/linkedin/ocr/get-linkedin-image-url:
    get:
      tags: [LinkedIn OCR]
      summary: Lease a batch of LinkedIn image ads queued for OCB/OCR
      description: >-
        Hands out up to 20 IMAGE ads (newest first; no last_seen window), resolves each image_url to an
        absolute NAS URL, and flips the batch to image_url_status=2 (in-progress). status=0 → OCB queue;
        status=4 → OCR queue (also returns image_ocr, joined from linkedin_ad_ocr_ocb_details). No auth.
        HTTP is always 200 — outcome is the body `code`.
      parameters:
        - in: query
          name: status
          required: true
          schema: { type: integer, enum: [0, 4], example: 0 }
          description: 0 = OCB queue, 4 = OCR queue
      responses:
        '200':
          description: Outcome in body code (200 leased, 400 empty/validation, 401 error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Url fetched successfully }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ad_id: { type: integer, example: 379113 }
                        image_url: { type: string, example: "https://media.globussoft.com/pas-dev/stream/linkedin/adImage/202606/379113.jpg" }
                        image_ocr: { type: string, nullable: true, description: Only present when status=4 }
                  exe_time: { type: number, example: 0.01 }

  /api/v1/linkedin/ocr/update-image-info:
    post:
      tags: [LinkedIn OCR]
      summary: Persist OCB/OCR results to MySQL (first) + Elasticsearch
      description: >-
        Writes MySQL FIRST then ES (reverse of GDN). On linkedin_ad_variants: sets image_text_final_status
        (when it was 0) and image_url_status (= status for 1/4). On the SEPARATE linkedin_ad_ocr_ocb_details
        table: stores the RAW body values (image_ocr kept if omitted), stamping object_update_date on status=1
        and ocr_updated_date on status=4 — both gated on that OCR row existing (else 400 "Please enter valid
        ad_id"). Then patches the flat linkedin_ads_data ES doc BY id=ad_id (no search): object/celebrity/brand
        as ||-exploded ARRAYS (brand under key image_brand, null when empty), ocr as a STRING — image_object/
        celebrity/brand only on status=1, image_ocr only on status=4. No auth; HTTP always 200 (outcome in body
        `code`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id]
              properties:
                ad_id: { type: integer, example: 379113, description: internal linkedin_ad.id }
                status: { type: integer, enum: [1, 4], example: 1, description: 1=OCB done, 4=OCR done }
                object: { type: string, nullable: true, example: "shoe||bottle", description: "RAW into MySQL; ||-exploded array in ES (status=1)" }
                celebrity: { type: string, nullable: true, example: "", description: "RAW into MySQL; ||-exploded array in ES (status=1)" }
                brand_logo: { type: string, nullable: true, example: "Nike", description: "RAW into MySQL; ||-exploded array in ES under key image_brand (status=1)" }
                ocr: { type: string, nullable: true, example: "Buy now||Limited offer", description: "kept if omitted; written to ES as a string (status=4)" }
      responses:
        '200':
          description: Outcome in body code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Data Updated Successfully }
              examples:
                updated: { summary: Success, value: { code: 200, message: Image Data Updated Successfully } }
                noOcrRow: { summary: No OCR/OCB row, value: { code: 400, message: Please enter valid ad_id } }
                notUpdated: { summary: ES not updated, value: { code: 400, message: Image Object not updated } }

  # ═══════════════════════════════════════════
  # YOUTUBE OCB (image-processing pipeline)
  # ═══════════════════════════════════════════

  /api/v1/youtube/ocr/get-ocb-url:
    get:
      tags: [YouTube OCB]
      summary: Lease a batch of YouTube image ads queued for OCB
      description: >-
        Hands out up to 20 OCB-pending IMAGE/DISPLAY ads (ocb_url_status=0), resolves video_url →
        absolute image_url, and flips them to ocb_url_status=1 so the next call does not return the
        same ads. Only type=1 (image OCB) is supported. No auth. HTTP is always 200; the body follows
        the PHP buildResponse shape (messages/data — note `messages` plural).
      parameters:
        - in: query
          name: type
          required: true
          schema: { type: integer, enum: [1], example: 1 }
          description: 1 = image OCB (IMAGE/DISPLAY). Any other value → 404 Missing Parameter.
      responses:
        '200':
          description: Outcome in body code (200 leased, 400 empty, 404 bad type, 500 error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  messages: { type: string, example: Success }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        ad_id: { type: integer, example: 295834 }
                        image_url: { type: string, example: "https://media.globussoft.com/pas-dev/stream/yt/adImage/202606/abc.webp" }
              examples:
                leased: { summary: Leased, value: { code: 200, messages: Success, data: [{ ad_id: 295834, image_url: "https://media.globussoft.com/...webp" }] } }
                empty: { summary: Queue empty, value: { code: 400, messages: No data found } }
                badType: { summary: Invalid type, value: { code: 404, messages: Missing Parameter, error: "" } }

  /api/v1/youtube/ocr/insert-update-ocb:
    post:
      tags: [YouTube OCB]
      summary: Persist OCB results (youtube_ad_ocb upsert + ES by _id)
      description: >-
        Upserts youtube_ad_ocb (keyed by youtube_ad_id), flips youtube_ad_variants.ocb_url_status to
        `status`, and patches the youtube_ads_data ES doc directly by _id (= ad_id). status=1 (OCB)
        writes object/celebrity/brand_logo (+ object_update_date) and ES image_object/image_celebrity/
        image_brand. ES fields are ARRAYS (split on ||), with NO language families. (The report also
        accepts status=4 → ocr per the PHP, but YouTube's pipeline is OCB-only.) No auth; HTTP always
        200 (outcome in body `code`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ad_id, status]
              properties:
                ad_id: { type: integer, example: 295834, description: youtube_ad_id (also the ES _id) }
                status: { type: integer, enum: [1, 4], example: 1, description: 1=OCB done (primary), 4=OCR done }
                object: { type: string, nullable: true, example: "shoe||bottle", description: "status=1; ||-delimited" }
                celebrity: { type: string, nullable: true, example: "", description: "status=1; ||-delimited" }
                brand_logo: { type: string, nullable: true, example: "Nike", description: "status=1; ||-delimited" }
                ocr: { type: string, nullable: true, example: "", description: "status=4; ||-delimited" }
      responses:
        '200':
          description: Outcome in body code
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string, example: Image Data Updated Successfully }
              examples:
                updated: { summary: Success, value: { code: 200, message: Image Data Updated Successfully } }
                alreadyUpdated: { summary: No change, value: { code: 400, message: Image Data is already updated } }
                esNoop: { summary: ES not updated, value: { code: 400, message: Image Object not updated } }
                missing: { summary: Validation, value: { code: 404, messages: Missing Parameter, error: "" } }

