<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>Competitor alert — PowerAdSpy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { margin:0 !important; padding:0 !important; width:100% !important; background-color:#f3f4f8;
           -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;
           font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#1a2240; }
    table, td { border-collapse:collapse !important; mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img { border:0; outline:none; text-decoration:none; -ms-interpolation-mode:bicubic; }
    a { text-decoration:none; }
    .ad-wrap { background-color:#f3f4f8; padding:24px 12px 40px;
               font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
    .ad-shell { max-width:560px; margin:0 auto; }
    @media only screen and (max-width:560px) {
      .ad-shell { width:100% !important; }
      .ad-wrap { padding:14px 8px 28px !important; }
      .ad-pad { padding-left:20px !important; padding-right:20px !important; }
    }
  </style>
</head>
<body>
  <div class="ad-wrap">
    <div class="ad-shell">

      <!-- HEADER -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td align="left" valign="middle" style="padding:4px 6px 16px;">
            <a href="{{ manageUrl }}" target="_blank" style="text-decoration:none;display:inline-block;">
              <img src="{{ logoUrl }}" alt="PowerAdSpy" width="300" style="max-width:300px;height:auto;display:inline-block;border:0;outline:none;-ms-interpolation-mode:bicubic;" />
            </a>
          </td>
          <td align="right" valign="middle" style="padding:4px 6px 16px;font-size:12px;color:#8b93a7;font-weight:600;">
            {{ dateLabel }}
          </td>
        </tr>
      </table>

      <!-- CARD -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
             style="background:#ffffff;border-radius:16px;">
        <tr>
          <td class="ad-pad" style="padding:30px 30px 8px;">
            <p style="margin:0 0 14px;font-size:16px;font-weight:700;color:#1a2240;">Hi {{ firstName }},</p>
            <p style="margin:0 0 14px;font-size:14px;line-height:22px;color:#3a4260;">
              {{ alertCount }} of your competitor alert rules on <b style="color:#1a2240;">{{ brandName }}</b> triggered today:
            </p>
          </td>
        </tr>

        <!-- ALERT LIST -->
        <tr>
          <td class="ad-pad" style="padding:2px 30px 12px;">
            {{ alertRowsHtml }}
          </td>
        </tr>

        <tr>
          <td class="ad-pad" style="padding:8px 30px 30px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td align="center" style="border-radius:999px;background:#2e5cff;">
                  <a href="{{ ctaUrl }}" target="_blank"
                     style="display:inline-block;color:#ffffff;font-size:14px;font-weight:700;padding:13px 28px;border-radius:999px;">
                    View competitor analytics&nbsp;&rarr;
                  </a>
                </td>
              </tr>
            </table>
            <p style="margin:18px 0 0;font-size:11px;line-height:17px;color:#9aa1b4;">
              Budget figures are an estimate derived from tracked ad activity, not disclosed ad spend.
            </p>
          </td>
        </tr>
      </table>

      <!-- FOOTER -->
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td align="center" style="padding:16px 16px 6px;font-size:11px;color:#9aa1b4;">
            <a href="{{ unsubscribe_link }}" clicktracking="off" style="color:#9aa1b4;text-decoration:underline;">Unsubscribe</a>
            &nbsp;·&nbsp;
            <a href="{{ manageUrl }}" style="color:#9aa1b4;text-decoration:underline;">Manage preferences</a>
          </td>
        </tr>
      </table>

    </div>
  </div>
</body>
</html>
