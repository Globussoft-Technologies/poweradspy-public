name: pas_node_api CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'pas_node_api/**'
      - '.github/workflows/deploy-pas-node-api.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pas_node_api/**'
      - '.github/workflows/deploy-pas-node-api.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: forwarded to server in webhook payload (server may skip pm2 restart)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pas-node-api-pr-{0}', github.ref) || 'pas-node-api-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI (install + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pas_node_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        # No `cache: npm` — pas_node_api has no package-lock.json yet.

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      # - name: Test
      #   # Hard-fail: a failing test fails the ci job, and `deploy` has
      #   # `needs: ci`, so deploy is skipped unless tests pass. These are
      #   # vitest unit tests (tests/**/*.test.mjs) — if any one needs a live
      #   # DB/Redis the runner doesn't have, flip this to `npm run test || true`
      #   # or add a service container.
      #   run: npm run test

      # No build step: pas_node_api is a plain Node server (`node src/server.js`),
      # nothing to compile.

  deploy:
    name: Deploy to dev server
    needs: ci
    # No deploy on PR runs — only on push to main or manual dispatch.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Server-side webhook listener (e.g. adnanh/webhook) pulls + rebuilds.
      WEBHOOK_PATH: /hooks/redeploy-pas-api
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - name: Dispatch secure webhook request
        # Pull-based deploy: instead of SSH+rsync from the runner, we send an
        # HMAC-SHA256-signed POST to the server's webhook endpoint. The server
        # verifies the signature against WEBHOOK_SECRET_KEY and runs its own
        # redeploy script (git pull && npm install && npm run build && pm2
        # restart). The runner never ships files or holds an SSH key.
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.WEBHOOK_SECRET_KEY }}" ]; then
            echo "::error::WEBHOOK_SECRET_KEY secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_IP_OR_DOMAIN }}" ]; then
            echo "::error::SERVER_IP_OR_DOMAIN secret is not set"
            exit 1
          fi

          # Signed body. dry_run is forwarded so the server-side script can
          # honor it (skip pm2 restart) if it chooses to.
          PAYLOAD=$(printf '{"event":"push","status":"verified","ref":"%s","sha":"%s","dry_run":%s}' \
            "${{ github.ref }}" "${{ github.sha }}" "$DRY_RUN")

          # HMAC-SHA256 over the exact bytes we send, formatted as GitHub does:
          # sha256=<hex>. Server must hash the raw request body with the same key.
          SIGNATURE="sha256=$(printf '%s' "$PAYLOAD" \
            | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET_KEY }}" \
            | sed 's/^.* //')"

          URL="https://${{ secrets.SERVER_IP_OR_DOMAIN }}$WEBHOOK_PATH"
          echo "POST $URL (dry_run=$DRY_RUN)"

          # Fail the job on any non-2xx response so a rejected/failed redeploy
          # surfaces in CI instead of silently passing.
          HTTP_CODE=$(curl -sS -X POST \
            --max-time 60 \
            -o /tmp/webhook_response.txt \
            -w '%{http_code}' \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD" \
            "$URL")

          echo "Response ($HTTP_CODE):"
          cat /tmp/webhook_response.txt || true
          echo

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Webhook returned HTTP $HTTP_CODE — redeploy not accepted"
            exit 1
          fi
          echo "Webhook accepted — server is handling the redeploy."
