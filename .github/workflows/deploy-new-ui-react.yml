name: new-ui-react CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'new-ui-react/**'
      - '.github/workflows/deploy-new-ui-react.yml'
  pull_request:
    branches: [main]
    paths:
      - 'new-ui-react/**'
      - '.github/workflows/deploy-new-ui-react.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: rsync --dry-run, no build, no pm2 restart'
        type: boolean
        default: false

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('new-ui-react-pr-{0}', github.ref) || 'new-ui-react-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI (install + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: new-ui-react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: new-ui-react/package-lock.json

      - name: Install deps
        # new-ui-react has a committed package-lock.json, so ci is the fast,
        # reproducible path; the fallback keeps the job green if it ever drops.
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      # No lint step: package.json defines no `lint` script. Add a `lint`
      # script and a soft-fail `npm run lint || true` step here if you want it.

      # - name: Test
      #   # Hard-fail: a failing test fails the ci job, and `deploy` has
      #   # `needs: ci`, so deploy is skipped unless tests pass.
      #   run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to dev server
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Per-service server + login (every app has its own) -> repo Secrets,
      # prefixed NEW_UI_REACT_*.
      REMOTE_HOST: ${{ secrets.NEW_UI_REACT_DEPLOY_HOST }}
      REMOTE_USER: ${{ secrets.NEW_UI_REACT_DEPLOY_USER }}
      # Per-service values (every app differs) -> repo Variables, prefixed
      # NEW_UI_REACT_*. Set them in Settings -> Secrets and variables ->
      # Actions -> Variables. Not secret, so Variables (not Secrets).
      REMOTE_PATH: ${{ vars.NEW_UI_REACT_REMOTE_PATH }}    # absolute path the app lives in on the server
      SERVICE_USER: ${{ vars.NEW_UI_REACT_SERVICE_USER }}  # unix user that owns REMOTE_PATH / runs pm2
      PM2_PROCESS: ${{ vars.NEW_UI_REACT_PM2_PROCESS }}    # pm2 process name (pm2 list) to restart
      APP_PORT: ${{ vars.NEW_UI_REACT_APP_PORT }}          # port the frontend listens on (health check)
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate service config
        # Fail fast with a clear message if a per-service Variable is unset,
        # instead of rsync-ing into an empty path or grepping an empty port.
        run: |
          missing=0
          for v in REMOTE_PATH SERVICE_USER PM2_PROCESS APP_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Variable NEW_UI_REACT_${v} is not set (Settings -> Secrets and variables -> Actions -> Variables)"
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.NEW_UI_REACT_DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.NEW_UI_REACT_DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.NEW_UI_REACT_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            echo "DEPLOY_KNOWN_HOSTS secret not set; scanning $REMOTE_HOST with ssh-keyscan"
            ssh-keyscan -t rsa,ecdsa,ed25519 "$REMOTE_HOST" >> ~/.ssh/known_hosts
          fi
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::~/.ssh/known_hosts is empty — set the DEPLOY_KNOWN_HOSTS secret or check that the runner can reach $REMOTE_HOST:22"
            exit 1
          fi
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy
            HostName $REMOTE_HOST
            User $REMOTE_USER
            IdentityFile ~/.ssh/deploy_key
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
            ConnectTimeout 30
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Sanity-check SSH + server state
        run: |
          ssh deploy "hostname; id; test -d $REMOTE_PATH && echo 'REMOTE_PATH ok' || (echo 'REMOTE_PATH missing!'; exit 2)"
          ssh deploy "test -f $REMOTE_PATH/.env && echo 'server .env present (VITE_* vars will be used at build time)' || echo 'WARNING: no .env on server — build may produce dev-URL-less bundle'"

      - name: Rsync source
        run: |
          RSYNC_FLAGS="-avz --human-readable"
          if [ "$DRY_RUN" = "true" ]; then
            RSYNC_FLAGS="$RSYNC_FLAGS --dry-run"
            echo "### DRY RUN — no files will be written ###"
          fi
          rsync $RSYNC_FLAGS \
            --exclude='node_modules/' \
            --exclude='dist/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.log' \
            --rsync-path="sudo -u $SERVICE_USER rsync" \
            new-ui-react/ \
            deploy:"$REMOTE_PATH/"

      - name: Install dependencies on server
        if: env.DRY_RUN != 'true'
        # Always install for the frontend — Vite builds need the full dep
        # tree, and dep-hash comparison is cheaper than a stale-build bug.
        run: |
          ssh deploy "sudo -u $SERVICE_USER -H bash -lc '\
            source ~/.nvm/nvm.sh && \
            cd $REMOTE_PATH && \
            npm install --no-audit --no-fund'"

      - name: Build on server
        if: env.DRY_RUN != 'true'
        # Server .env provides VITE_* vars that get baked into the bundle.
        run: |
          ssh deploy "sudo -u $SERVICE_USER -H bash -lc '\
            source ~/.nvm/nvm.sh && \
            cd $REMOTE_PATH && \
            npm run build'"

      - name: Restart pm2 process
        if: env.DRY_RUN != 'true'
        run: |
          ssh deploy "sudo -u $SERVICE_USER -H bash -lc '\
            source ~/.nvm/nvm.sh && \
            pm2 restart $PM2_PROCESS --update-env && \
            pm2 save'"

      - name: Health check
        if: env.DRY_RUN != 'true'
        run: |
          sleep 5
          ssh deploy "sudo ss -tlnp | grep ':$APP_PORT ' || (echo 'port $APP_PORT not listening'; exit 3)"
          ssh deploy "curl -sS -o /dev/null -w '%{http_code}\n' --max-time 10 http://127.0.0.1:$APP_PORT/ || (echo 'frontend not reachable'; exit 4)"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
