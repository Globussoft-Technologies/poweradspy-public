name: admin_panel_backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'admin_panel_backend/**'
      - '.github/workflows/deploy-admin-panel-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'admin_panel_backend/**'
      - '.github/workflows/deploy-admin-panel-backend.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run: rsync --dry-run, no pm2 restart'
        type: boolean
        default: false

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('admin-panel-backend-pr-{0}', github.ref) || 'admin-panel-backend-deploy' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: CI (install + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_panel_backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
        # No `cache: npm` — admin_panel_backend has no package-lock.json yet.

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Test
        # Hard-fail: a failing test fails the ci job, and `deploy` has
        # `needs: ci`, so deploy is skipped unless tests pass. If a test needs
        # a live DB/Redis the runner lacks, flip to `npm run test || true`.
        run: npm run test

      # No build step: plain Node server (`node index.js`), nothing to compile.

  deploy:
    name: Deploy to dev server
    needs: ci
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      # Per-service server + login (every app has its own) -> repo Secrets,
      # prefixed ADMIN_PANEL_BACKEND_*. The login user MUST be the unix user
      # that owns REMOTE_PATH and runs pm2 — we run everything directly as
      # them, no sudo.
      REMOTE_HOST: ${{ secrets.ADMIN_PANEL_BACKEND_DEPLOY_HOST }}
      REMOTE_USER: ${{ secrets.ADMIN_PANEL_BACKEND_DEPLOY_USER }}
      # Per-service values (every app differs) -> repo Variables, prefixed
      # ADMIN_PANEL_BACKEND_*. Set them in Settings -> Secrets and variables ->
      # Actions -> Variables. Not secret, so Variables (not Secrets).
      REMOTE_PATH: ${{ vars.ADMIN_PANEL_BACKEND_REMOTE_PATH }}    # absolute path the app lives in on the server
      PM2_PROCESS: ${{ vars.ADMIN_PANEL_BACKEND_PM2_PROCESS }}    # pm2 process NAME (pm2 list) to restart
      APP_PORT: ${{ vars.ADMIN_PANEL_BACKEND_APP_PORT }}          # port the API listens on (health check) — likely 4000
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate service config
        # Fail fast with a clear message if a per-service Variable is unset,
        # instead of rsync-ing into an empty path or grepping an empty port.
        run: |
          missing=0
          for v in REMOTE_PATH PM2_PROCESS APP_PORT; do
            if [ -z "${!v}" ]; then
              echo "::error::Variable ADMIN_PANEL_BACKEND_${v} is not set (Settings -> Secrets and variables -> Actions -> Variables)"
              missing=1
            fi
          done
          [ "$missing" = "0" ]

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ADMIN_PANEL_BACKEND_DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.ADMIN_PANEL_BACKEND_DEPLOY_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.ADMIN_PANEL_BACKEND_DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            echo "ADMIN_PANEL_BACKEND_DEPLOY_KNOWN_HOSTS secret not set; scanning $REMOTE_HOST with ssh-keyscan"
            ssh-keyscan -t rsa,ecdsa,ed25519 "$REMOTE_HOST" >> ~/.ssh/known_hosts
          fi
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::~/.ssh/known_hosts is empty — set the ADMIN_PANEL_BACKEND_DEPLOY_KNOWN_HOSTS secret or check that the runner can reach $REMOTE_HOST:22"
            exit 1
          fi
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<EOF
          Host deploy
            HostName $REMOTE_HOST
            User $REMOTE_USER
            IdentityFile ~/.ssh/deploy_key
            UserKnownHostsFile ~/.ssh/known_hosts
            StrictHostKeyChecking yes
            ConnectTimeout 30
            ServerAliveInterval 30
          EOF
          chmod 600 ~/.ssh/config

      - name: Sanity-check SSH + server state
        run: |
          ssh deploy "hostname; id; test -d $REMOTE_PATH && echo 'REMOTE_PATH ok' || (echo 'REMOTE_PATH missing!'; exit 2)"
          ssh deploy "test -f $REMOTE_PATH/.env && echo 'server .env present' || echo 'WARNING: no .env on server — the API may fail to start (DB/Redis creds, PORT, etc.)'"

      - name: Rsync source
        run: |
          RSYNC_FLAGS="-avz --human-readable"
          if [ "$DRY_RUN" = "true" ]; then
            RSYNC_FLAGS="$RSYNC_FLAGS --dry-run"
            echo "### DRY RUN — no files will be written ###"
          fi
          rsync $RSYNC_FLAGS \
            --exclude='node_modules/' \
            --exclude='coverage/' \
            --exclude='logs/' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='*.log' \
            admin_panel_backend/ \
            deploy:"$REMOTE_PATH/"

      - name: Install dependencies on server
        if: env.DRY_RUN != 'true'
        run: |
          ssh deploy "bash -lc '\
            source ~/.nvm/nvm.sh && \
            cd $REMOTE_PATH && \
            npm install --no-audit --no-fund'"

      # No build step on the server either — plain Node server.

      - name: Restart pm2 process
        if: env.DRY_RUN != 'true'
        run: |
          ssh deploy "bash -lc '\
            source ~/.nvm/nvm.sh && \
            pm2 restart $PM2_PROCESS --update-env && \
            pm2 save'"

      - name: Health check
        if: env.DRY_RUN != 'true'
        run: |
          sleep 5
          # No /health route in this app — we only verify the port is bound and
          # the server answers (any HTTP status = up; curl fails only if the
          # connection is refused).
          ssh deploy "ss -tln | grep ':$APP_PORT ' || (echo 'port $APP_PORT not listening'; exit 3)"
          ssh deploy "curl -sS -o /dev/null -w '%{http_code}\n' --max-time 10 http://127.0.0.1:$APP_PORT/ || (echo 'API not reachable'; exit 4)"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
